<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArjunaFit — Recetario & Restaurantes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/theme.js"></script>
<link rel="stylesheet" href="../css/app.css">
<style>
body{background:var(--bg)}
.page-hdr{background:linear-gradient(135deg,#be185d,#ec4899);padding:18px 16px 30px;color:white;position:relative;overflow:hidden;flex-shrink:0}
.page-hdr::after{content:'🍽️';position:absolute;right:-10px;bottom:-20px;font-size:110px;opacity:.08}
.back-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.back{width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:none;color:white}
.hdr-title{font-size:24px;font-weight:900}
.hdr-sub{font-size:14px;opacity:.85;margin-top:3px}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:13px 6px;text-align:center;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:3px solid transparent;transition:all .2s}
.tab.on{color:var(--pink);border-bottom-color:var(--pink)}

/* Search */
.search-bar{padding:10px 14px;position:relative;flex-shrink:0}
.search-in{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px 42px 12px 44px;font-family:var(--font);font-size:15px;color:var(--text);outline:none}
.search-in:focus{border-color:var(--pink)}
.search-ico{position:absolute;left:26px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none}
.search-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:4px}

/* Filter pills */
.filters{display:flex;gap:7px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.on{background:var(--pink);border-color:var(--pink);color:white}

/* Recipe grid */
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 100px}
.recipe-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s}
.recipe-card:active{transform:scale(.97)}
.recipe-emo{height:80px;display:flex;align-items:center;justify-content:center;font-size:50px;background:linear-gradient(135deg,var(--pink-light),var(--primary-light))}
.recipe-body{padding:10px}
.recipe-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:6px}
.recipe-tags{display:flex;gap:4px;flex-wrap:wrap}
.rtag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px}
.rtag-k{background:var(--gold-light);color:var(--gold)}
.rtag-p{background:rgba(220,38,38,.08);color:var(--red)}
.rtag-t{background:var(--primary-light);color:var(--primary)}
.rtag-o{background:var(--green-light);color:var(--green)}

/* Recipe detail */
.recipe-detail{padding-bottom:100px}
.detail-back{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--border);cursor:pointer;background:var(--surface);position:sticky;top:0;z-index:10}
.detail-emo{height:180px;display:flex;align-items:center;justify-content:center;font-size:90px;background:linear-gradient(135deg,var(--pink-light),var(--primary-light))}
.detail-body{padding:16px}
.detail-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px}
.detail-meta{font-size:14px;color:var(--text2);margin-bottom:14px}
.macros-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.macro-b{background:var(--surface2);border-radius:12px;padding:10px;text-align:center}
.macro-v{font-size:17px;font-weight:900;color:var(--primary)}
.macro-l{font-size:11px;color:var(--text3);margin-top:2px}
.sec-h{font-size:15px;font-weight:800;color:var(--text);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.ing-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-ico{font-size:22px;width:28px;text-align:center;flex-shrink:0}
.ing-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ing-qty{font-size:13px;font-weight:800;color:var(--primary);background:var(--primary-light);padding:3px 8px;border-radius:7px;white-space:nowrap}
.step-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.step-row:last-child{border-bottom:none}
.step-n{width:26px;height:26px;border-radius:50%;background:var(--pink);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:2px}
.step-t{font-size:14px;color:var(--text2);line-height:1.6;flex:1}
.tip-b{background:var(--primary-light);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:14px;color:var(--primary);line-height:1.6}

/* City picker */
.city-picker{padding:10px 14px;flex-shrink:0}
.city-select{width:100%;padding:13px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;color:var(--text);outline:none;cursor:pointer}
.city-select:focus{border-color:var(--pink)}

/* Restaurant card */
.rest-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:10px}
.rest-top{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.rest-ava{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:var(--primary-light)}
.rest-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
.rest-zone{font-size:13px;color:var(--text2);margin-top:3px}
.rest-stars{font-size:12px;color:var(--gold);margin-top:2px}
.rest-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.rest-tag{font-size:12px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--surface2);color:var(--text2)}
.rest-best{background:var(--green-light);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--green);font-weight:700;margin-bottom:6px;line-height:1.5}
.rest-tip{font-size:13px;color:var(--text2);line-height:1.5;padding:8px;background:var(--surface2);border-radius:10px}
.delivery-badge{font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary);padding:4px 8px;border-radius:8px;text-align:center;margin-left:auto;flex-shrink:0}

/* Fast food */
.ff-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:10px}
.ff-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ff-emo{font-size:36px}
.ff-name{font-size:16px;font-weight:800;color:var(--text)}
.ff-sub{font-size:13px;color:var(--text2);margin-top:2px}
.ff-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ff-item:last-child{border-bottom:none}
.ff-item-emo{font-size:18px}
.ff-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ff-item-kcal{font-size:12px;color:var(--text3);margin-right:4px}
.ff-item-tip{font-size:12px;font-weight:700;color:var(--green);background:var(--green-light);padding:3px 8px;border-radius:7px;white-space:nowrap}
.ff-avoid{background:var(--red-light);border-radius:10px;padding:10px;font-size:13px;color:var(--red);margin-top:8px;font-weight:600}
.ff-pro{background:var(--primary-light);border-radius:10px;padding:10px;font-size:13px;color:var(--primary);margin-top:6px;line-height:1.5}

.empty-state{text-align:center;padding:40px 20px}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty-ttl{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--text2)}
</style>
</head>
<body>
<div class="shell" style="display:flex;flex-direction:column;height:100dvh;overflow:hidden">
  <div class="page-hdr">
    <div class="back-row">
      <button class="back" onclick="history.back()">←</button>
      <button class="theme-toggle" onclick="toggleTheme()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.2)">🌙</button>
    </div>
    <div class="hdr-title">Recetario & Restaurantes 🍽️</div>
    <div class="hdr-sub">30+ recetas · Comida rápida fit · 6 ciudades Colombia</div>
  </div>

  <div class="tabs">
    <button class="tab on"  onclick="showTab('recipes',this)">📖 Recetario</button>
    <button class="tab"     onclick="showTab('fast',this)">⚡ Rápido</button>
    <button class="tab"     onclick="showTab('rests',this)">📍 Restaurantes</button>
  </div>

  <!-- Dynamic header area for filters/search/city -->
  <div id="dynHeader"></div>

  <!-- Main content -->
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch" id="content"></div>

  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Inicio</a>

</div>

<script>
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
const RECIPES = [
  // ─── DESAYUNOS ────────────────────────────────────
  {id:'d1',cat:'desayuno',obj:['crecer','bajar'],emo:'🥚',name:'Huevos Revueltos con Arepa y Aguacate',time:'15min',kcal:420,prot:28,carb:32,fat:18,diff:'fácil',
   desc:'El desayuno colombiano fitness clásico. Proteína, carbohidrato limpio y grasas buenas.',
   ing:[{i:'🥚',n:'Huevos enteros',q:'3'},{i:'🫓',n:'Arepa delgada',q:'2'},{i:'🥑',n:'Aguacate',q:'½'},{i:'🍅',n:'Tomate',q:'1'},{i:'🧂',n:'Sal y pimienta',q:'Al gusto'}],

   tip:'💡 Huevos cremosos (scrambled) retienen más nutrientes. No los cocines de más.'},

  {id:'d2',cat:'desayuno',obj:['crecer','bajar'],emo:'🥣',name:'Overnight Oats con Fresas',time:'5min+noche',kcal:380,prot:22,carb:48,fat:10,diff:'fácil',
   desc:'Prepara la noche anterior — mañana desayuno listo en 0 segundos.',
   ing:[{i:'🥣',n:'Avena en hojuelas',q:'50g'},{i:'🥛',n:'Leche descremada',q:'200ml'},{i:'🫙',n:'Yogur griego',q:'100g'},{i:'🍓',n:'Fresas',q:'100g'},{i:'🥜',n:'Maní o almendras',q:'1 cda'}],
   steps:['Mezcla avena + leche + yogur en un frasco. Agrega 1 cdita de miel si quieres.','Tapa y refrigera toda la noche (mínimo 6h).','Al servir: corta las fresas y ponlas encima con el maní.','¡Listo! Sin cocción, sin esfuerzo.'],
   tip:'💡 Prepara 5 frascos el domingo — desayuno de toda la semana. Duran 4 días en nevera.'},

  {id:'d3',cat:'desayuno',obj:['bajar'],emo:'🍳',name:'Tortilla de Claras con Espinaca',time:'10min',kcal:210,prot:30,carb:4,fat:7,diff:'fácil',
   desc:'Alta proteína, muy baja en grasa. El desayuno de definición.',
   ing:[{i:'🥚',n:'Claras de huevo',q:'6'},{i:'🥬',n:'Espinaca baby',q:'1 taza'},{i:'🍅',n:'Tomate',q:'½'},{i:'🧅',n:'Cebolla',q:'¼'},{i:'🧂',n:'Sal y ajo en polvo',q:'Al gusto'}],
   steps:['Saltea cebolla y tomate en sartén con spray de aceite por 2 min.','Agrega espinaca, cocina 1 min hasta marchitar.','Bate las claras con sal. Vierte sobre las verduras.','Tapa y cocina a fuego bajo 3-4 min. Dobla y sirve.'],
   tip:'💡 Con ½ aguacate al lado agregas grasas buenas que mejoran absorción de vitaminas.'},

  {id:'d4',cat:'desayuno',obj:['crecer'],emo:'🥞',name:'Pancakes de Avena y Banano',time:'15min',kcal:380,prot:24,carb:52,fat:8,diff:'fácil',
   desc:'Sin harina blanca, sin azúcar añadida. Pancakes fitness de verdad.',
   ing:[{i:'🥣',n:'Avena en hojuelas',q:'80g'},{i:'🍌',n:'Banano muy maduro',q:'1'},{i:'🥚',n:'Huevos',q:'2'},{i:'🥛',n:'Leche',q:'4 cdas'},{i:'🫙',n:'Yogur griego',q:'50g'}],
   steps:['Licúa o procesa todos los ingredientes hasta mezcla homogénea.','Calienta sartén antiadherente a fuego medio — sin aceite.','Vierte ¼ de la mezcla. Cocina 2-3 min hasta ver burbujas. Voltea y 1 min más.','Repite. Sirve con fruta fresca o miel.'],
   tip:'💡 Congela el banano un día antes para textura más cremosa.'},

  {id:'d5',cat:'desayuno',obj:['crecer','bajar'],emo:'🫙',name:'Bowl de Yogur Proteico',time:'5min',kcal:280,prot:22,carb:26,fat:6,diff:'fácil',
   desc:'Sin cocción. El desayuno más rápido del recetario.',
   ing:[{i:'🫙',n:'Yogur griego natural',q:'200g'},{i:'🍌',n:'Banano',q:'½'},{i:'🍓',n:'Fresas o moras',q:'80g'},{i:'🥣',n:'Granola sin azúcar',q:'2 cdas'},{i:'🥜',n:'Mantequilla de maní',q:'1 cdita'}],
   steps:['Coloca el yogur en un bowl.','Corta el banano en rodajas y las fresas en mitades.','Agrega las frutas encima del yogur.','Finaliza con la granola y el maní. ¡Listo!'],
   tip:'💡 Zorba o San Martín natural: los mejores yogures colombianos. 17g proteína por 200g.'},

  // ─── ALMUERZOS ────────────────────────────────────
  {id:'a1',cat:'almuerzo',obj:['crecer','bajar'],emo:'🍗',name:'Pollo a la Plancha con Arroz y Ensalada',time:'25min',kcal:520,prot:45,carb:48,fat:12,diff:'fácil',

  {id:'a2',cat:'almuerzo',obj:['crecer','bajar'],emo:'🐟',name:'Bowl de Tilapia con Quinoa',time:'20min',kcal:480,prot:42,carb:36,fat:14,diff:'media',

  {id:'a3',cat:'almuerzo',obj:['crecer'],emo:'🥩',name:'Lomo con Papa Criolla y Brócoli',time:'25min',kcal:620,prot:50,carb:42,fat:20,diff:'media',
   desc:'Alto en nutrientes para días de entrenamiento pesado.',

  {id:'a4',cat:'almuerzo',obj:['bajar'],emo:'🥙',name:'Wrap Fit de Pollo',time:'15min',kcal:380,prot:38,carb:28,fat:10,diff:'fácil',
   desc:'Rápido, portátil. Perfecto para llevar al trabajo o al gym.',

   steps:['Desmecha el pollo con dos tenedores.','Mezcla el yogur griego con ajo en polvo y limón — es tu salsa.','Calienta la tortilla. Unta la salsa de yogur.','Agrega lechuga, pollo y tomate. Enrolla y sirve.'],
   tip:'💡 El yogur griego reemplaza la mayonesa: 10x menos grasa y más proteína.'},

  {id:'a5',cat:'almuerzo',obj:['crecer','bajar'],emo:'🫘',name:'Sancocho Fit de Pollo',time:'40min',kcal:420,prot:38,carb:35,fat:8,diff:'media',
   desc:'El plato colombiano por excelencia, versión fitness. Sin papa frita, sin grasas innecesarias.',
   ing:[{i:'🍗',n:'Pechuga de pollo',q:'200g'},{i:'🌽',n:'Mazorca',q:'½'},{i:'🥔',n:'Papa',q:'2 pequeñas'},{i:'🥕',n:'Zanahoria',q:'1'},{i:'🌿',n:'Cilantro, cebolla, ajo',q:'Al gusto'}],

  {id:'a6',cat:'almuerzo',obj:['bajar'],emo:'🥗',name:'Ensalada Paisa Fitness',time:'15min',kcal:350,prot:35,carb:25,fat:10,diff:'fácil',

   steps:['Desmecha el pollo cocido.','Mezcla fríjoles + tomate + maíz + cilantro.','Agrega el pollo y el aguacate en cubos.','Adereza con limón y sal. Sirve fresco.'],

  {id:'a7',cat:'almuerzo',obj:['crecer','bajar'],emo:'🐟',name:'Atún con Patacones Fit',time:'20min',kcal:400,prot:32,carb:38,fat:10,diff:'fácil',

   steps:['Corta el plátano verde en rodajas de 2cm. Hornea a 200°C por 15 min, aplana y hornea 10 min más.','Mezcla el atún con tomate, cebolla y cilantro picados.','Adereza con limón y sal.','Sirve el atún sobre los patacones al horno.'],

  // ─── CENAS ─────────────────────────────────────────
  {id:'c1',cat:'cena',obj:['crecer','bajar'],emo:'🐟',name:'Tilapia al Horno con Vegetales',time:'30min',kcal:320,prot:40,carb:12,fat:10,diff:'fácil',

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let currentTab='recipes', recipeFilter='all', selectedRecipe=null, searchQ='', selectedCity='cali';

async function init() {
  const _sb = supabase.createClient(
    'https://egswsqymkxmbtcpnozcq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnc3dzcXlta3htYnRjcG5vemNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjAzODIsImV4cCI6MjA5Mjg5NjM4Mn0.yIcQ7c4QF8wv0Dvtvaien5e-gi12CiruOBbYTeQRusM'
  );
  const {data:{session}} = await _sb.auth.getSession();
  if(session) {
    const {data:p} = await _sb.from('profiles').select('objetivo').eq('id',session.user.id).maybeSingle();
    // Could use profile to pre-filter
  }
  showTab('recipes', document.querySelector('.tab'));
}

// ══════════════════════════════════
// TABS
// ══════════════════════════════════
window.showTab = (tab, el) => {
  selectedRecipe=null; currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  renderDynHeader();
  renderContent();
};

function renderDynHeader() {
  const dh = document.getElementById('dynHeader');
  if(currentTab==='recipes') {
    dh.innerHTML = `
      <div class="search-bar">
        <span class="search-ico">🔍</span>
        <input class="search-in" id="searchIn" placeholder="Buscar receta..." value="${searchQ}"
          oninput="onSearch(this.value)">
        ${searchQ?`<button class="search-clear" onclick="clearSearch()">✕</button>`:''}
      </div>
      <div class="filters">
        ${[{k:'all',l:'🍽️ Todas'},{k:'desayuno',l:'🌅 Desayunos'},{k:'almuerzo',l:'☀️ Almuerzos'},
           {k:'cena',l:'🌙 Cenas'},{k:'merienda',l:'⚡ Meriendas'},{k:'especial',l:'⭐ Especiales'}]
          .map(f=>`<div class="pill ${recipeFilter===f.k?'on':''}" onclick="setFilter('${f.k}')">${f.l}</div>`).join('')}
      </div>`;
  } else if(currentTab==='rests') {
    dh.innerHTML = `
      <div class="city-picker">
        <select class="city-select" onchange="setCity(this.value)">
          ${Object.entries(CITIES).map(([k,v])=>`<option value="${k}" ${selectedCity===k?'selected':''}>${v.emoji} ${v.name}</option>`).join('')}
        </select>
      </div>`;
  } else {
    dh.innerHTML='';
  }
}

function renderContent() {
  const c = document.getElementById('content');
  if(currentTab==='recipes') renderRecipes(c);
  else if(currentTab==='fast') renderFast(c);
  else renderRestaurants(c);
}

// ══════════════════════════════════
// RECIPES
// ══════════════════════════════════
function renderRecipes(c) {
  if(selectedRecipe) { renderDetail(c); return; }
  let list = RECIPES;
  if(recipeFilter!=='all') list=list.filter(r=>r.cat===recipeFilter);
  if(searchQ) list=list.filter(r=>r.name.toLowerCase().includes(searchQ)||r.desc.toLowerCase().includes(searchQ));
  if(!list.length){c.innerHTML=`<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-ttl">Sin resultados</div><div class="empty-sub">Prueba otra búsqueda</div></div>`;return;}
  c.innerHTML=`<div class="recipe-grid">${list.map(r=>`
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="recipe-emo">${r.emo}</div>
      <div class="recipe-body">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-tags">
          <span class="rtag rtag-k">~${r.kcal}kcal</span>
          <span class="rtag rtag-p">${r.prot}g prot</span>
          <span class="rtag rtag-t">⏱${r.time}</span>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

window.setFilter=(f)=>{recipeFilter=f;renderDynHeader();renderRecipes(document.getElementById('content'));};
window.onSearch=(v)=>{searchQ=v.toLowerCase();renderDynHeader();renderRecipes(document.getElementById('content'));};
window.clearSearch=()=>{searchQ='';renderDynHeader();renderRecipes(document.getElementById('content'));};
window.openRecipe=(id)=>{selectedRecipe=RECIPES.find(r=>r.id===id);renderDetail(document.getElementById('content'));document.getElementById('content').scrollTop=0;};
window.backRecipes=()=>{selectedRecipe=null;renderContent();};

function renderDetail(c) {
  const r=selectedRecipe;
  c.innerHTML=`
    <div class="detail-back" onclick="backRecipes()"><span style="font-size:20px">←</span><span style="font-size:15px;font-weight:700;color:var(--pink)">Volver al recetario</span></div>
    <div class="recipe-detail">
      <div class="detail-emo">${r.emo}</div>
      <div class="detail-body">
        <div class="detail-title">${r.name}</div>
        <div class="detail-meta">⏱ ${r.time} · 🔥 Dificultad: ${r.diff} · 🍽️ 1 porción</div>
        <div class="macros-grid">
          <div class="macro-b"><div class="macro-v">${r.kcal}</div><div class="macro-l">kcal</div></div>
          <div class="macro-b"><div class="macro-v">${r.prot}g</div><div class="macro-l">proteína</div></div>
          <div class="macro-b"><div class="macro-v">${r.carb}g</div><div class="macro-l">carbos</div></div>
          <div class="macro-b"><div class="macro-v">${r.fat}g</div><div class="macro-l">grasas</div></div>
        </div>
        <div class="sec-h">🛒 Ingredientes</div>
        <div>${r.ing.map(i=>`<div class="ing-row"><div class="ing-ico">${i.i}</div><div class="ing-name">${i.n}</div><div class="ing-qty">${i.q}</div></div>`).join('')}</div>
        <div class="sec-h">👩‍🍳 Preparación</div>
        <div>${r.steps.map((s,i)=>`<div class="step-row"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`).join('')}</div>
        <div class="tip-b">${r.tip}</div>
      </div>
    </div>`;
}

// ══════════════════════════════════
// FAST FOOD
// ══════════════════════════════════
function renderFast(c) {
  c.innerHTML=`
    <div style="margin:14px 14px 0;background:var(--gold-light);border:1.5px solid rgba(146,64,14,.15);border-radius:14px;padding:14px;font-size:14px;color:var(--gold);line-height:1.6">
      💡 <strong>La regla de oro:</strong> La comida rápida no destruye tu dieta si sabes pedir. Proteína a la plancha, sin salsas, sin papas, con agua.
    </div>
    <div style="padding:14px 14px 100px">
      ${FAST_FOOD.map(f=>`
        <div class="ff-card">
          <div class="ff-top"><div class="ff-emo">${f.emo}</div><div><div class="ff-name">${f.n}</div><div class="ff-sub">${f.sub}</div></div></div>
          <div style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:8px">✅ Pide esto:</div>
          ${f.items.map(i=>`<div class="ff-item"><div class="ff-item-emo">${i.e}</div><div class="ff-item-name">${i.n}</div><div class="ff-item-kcal">${i.k}</div><div class="ff-item-tip">${i.t}</div></div>`).join('')}
          <div class="ff-avoid">${f.avoid}</div>
          <div class="ff-pro">${f.pro}</div>
        </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════
// RESTAURANTS BY CITY
// ══════════════════════════════════
window.setCity=(c)=>{selectedCity=c;renderRestaurants(document.getElementById('content'));};

function renderRestaurants(c) {
  const city=CITIES[selectedCity];
  c.innerHTML=`
    <div style="padding:14px 14px 0;display:flex;align-items:center;gap:8px;font-size:22px;font-weight:900;color:var(--text)">
      ${city.emoji} ${city.name}
      <span style="font-size:13px;font-weight:600;color:var(--text3)">${city.restaurants.length} lugares</span>
    </div>
    <div style="padding:10px 14px 100px">
      ${city.restaurants.map(r=>`
        <div class="rest-card">
          <div class="rest-top">
            <div class="rest-ava">${r.emo}</div>
            <div style="flex:1">
              <div class="rest-name">${r.n}</div>
              <div class="rest-zone">📍 ${r.zone}</div>
              <div class="rest-stars">${r.stars}</div>
            </div>
            ${r.del!=='No'?`<div class="delivery-badge">🛵<br>${r.del}</div>`:''}
          </div>
          <div class="rest-tags">${r.tags.map(t=>`<span class="rest-tag">${t}</span>`).join('')}</div>
          <div style="font-size:14px;color:var(--text2);margin-bottom:8px;line-height:1.5">${r.desc}</div>
          <div class="rest-best">${r.best}</div>
          <div class="rest-tip">💡 ${r.tip}</div>
        </div>`).join('')}
    </div>`;
}

init();
</script>
