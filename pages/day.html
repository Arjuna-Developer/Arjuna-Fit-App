<style>
body { background: var(--surface); }
.day-hdr { padding:16px;display:flex;align-items:center;gap:12px;color:white;flex-shrink:0 }
.back { width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;border:none;color:white }
.hdr-info { flex:1 }
.hdr-sub { font-size:13px;opacity:.8;text-transform:uppercase;letter-spacing:1px }
.hdr-title { font-size:18px;font-weight:900 }
.hdr-badge { background:rgba(255,255,255,.25);padding:6px 14px;border-radius:999px;font-size:13px;font-weight:800 }

.ptabs { display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0 }
.ptab { flex:1;padding:14px 6px;text-align:center;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:3px solid transparent;transition:all .2s }
.ptab.on { color:var(--primary);border-bottom-color:var(--primary) }

/* Exercise card */
.ex-card { background:var(--surface);border:2px solid var(--border);border-radius:18px;margin-bottom:12px;overflow:hidden;transition:border-color .3s }
.ex-card.done-ex { border-color:var(--green) }
.ex-hdr { padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer }
.ex-num { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;background:var(--primary-light);color:var(--primary) }
.ex-num.ok { background:var(--green-light);color:var(--green) }
.ex-name { font-size:15px;font-weight:800;color:var(--text) }
.ex-meta { font-size:13px;color:var(--text2);margin-top:2px }
.ex-chev { font-size:16px;color:var(--text3);transition:transform .2s }
.ex-chev.up { transform:rotate(180deg) }
.ex-body { display:none;padding:14px 16px }
.ex-body.open { display:block }

/* Video */
.vid-wrap { background:#000;border-radius:12px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden }
.vid-ph { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:white;text-align:center;padding:16px;background:linear-gradient(135deg,#1e1e2e,#2d2d44);width:100%;height:100% }

/* Serie item */
.serie-item { border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;transition:all .25s }
.serie-item.active { border-color:var(--primary);background:var(--primary-light) }
.serie-item.done { border-color:var(--green);background:var(--green-light);opacity:.7 }
.serie-label { font-size:15px;font-weight:800;color:var(--text) }
.serie-item.active .serie-label { color:var(--primary) }
.serie-item.done .serie-label { color:var(--green) }
.serie-sub { font-size:13px;color:var(--text3);margin-top:3px }

/* Kg input */
.kg-row { display:flex;gap:8px;align-items:center;margin:12px 0 }
.kg-btn { width:48px;height:48px;border-radius:12px;border:2px solid var(--border);background:var(--surface);font-size:22px;font-weight:700;cursor:pointer;color:var(--text);flex-shrink:0;transition:all .15s }
.kg-btn:active { transform:scale(.92) }
.kg-in { flex:1;padding:14px;border:2px solid var(--primary);border-radius:12px;font-family:var(--font);font-size:24px;font-weight:900;color:var(--text);background:var(--surface);text-align:center;outline:none }
/* Kg input — layout fijo sin overflow */
.kg-row { display:grid;grid-template-columns:52px 1fr 52px;gap:8px;align-items:center;margin:12px 0;width:100% }
.kg-btn { width:52px;height:52px;border-radius:12px;border:2px solid var(--border);background:var(--surface);font-size:26px;font-weight:700;cursor:pointer;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center }
.kg-btn:active { transform:scale(.9);background:var(--primary-light) }
.kg-in { width:100%;padding:14px 36px 14px 14px;border:2.5px solid var(--primary);border-radius:12px;font-family:var(--font);font-size:24px;font-weight:900;color:var(--text);background:var(--surface);text-align:center;outline:none;box-sizing:border-box }
.kg-in-wrap { position:relative;min-width:0 }
.kg-in-unit { position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:var(--text3);pointer-events:none }
.kg-unit { font-size:13px;color:var(--text3);text-align:center }
.done-kg { font-size:14px;font-weight:700;color:var(--green);margin-top:6px }
.last-kg { font-size:14px;color:var(--text3);text-align:center;margin-bottom:10px;background:var(--surface2);border-radius:10px;padding:8px 12px }
.kg-suggest { background:var(--green-light);border:1.5px solid rgba(5,150,105,.25);border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:14px;color:var(--green);font-weight:700;display:flex;gap:8px;align-items:center;line-height:1.4 }
.complete-btn { width:100%;padding:16px;border:none;border-radius:12px;background:var(--primary);color:white;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:12px }
.complete-btn:active { transform:scale(.97) }

/* Timer */
.timer-overlay { position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px) }
.timer-overlay.show { display:flex }
.timer-sheet { background:var(--surface);border-radius:24px 24px 0 0;padding:28px 24px;padding-bottom:calc(28px + env(safe-area-inset-bottom));width:100%;max-width:430px;text-align:center }
.timer-title { font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px }
.timer-ex { font-size:18px;font-weight:900;color:var(--text);margin-bottom:20px }
.timer-num { font-size:72px;font-weight:900;color:var(--primary);line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums }
.timer-lbl { font-size:14px;color:var(--text3);margin-bottom:24px }
.timer-btns { display:flex;gap:12px }

/* Complete */
.complete-wrap { position:sticky;bottom:0;background:var(--surface);border-top:2px solid var(--border);padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));display:none }

/* Celebrate */
.cel { position:fixed;inset:0;background:linear-gradient(135deg,#1e40af,#7c3aed);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px }
.cel.show { display:flex }
.cel-emo { font-size:80px;animation:pulse 1s ease infinite }
.cel-title { font-size:30px;font-weight:900;color:white }
.cel-sub { font-size:16px;color:rgba(255,255,255,.8);line-height:1.6;max-width:300px }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

<div class="shell" id="shell" style="background:#7c3aed">

  <div class="day-hdr">
    <button class="back" onclick="history.back()">←</button>
    <div class="hdr-info">
      <div class="hdr-sub" id="hdrSub">Cargando...</div>
      <div class="hdr-title" id="hdrTitle">...</div>
    </div>
    <div class="hdr-badge" id="hdrBadge">S1</div>
  </div>

  <div class="ptabs">
    <button class="ptab on" id="tabMethod"   onclick="showTab('method')">📋 Método</button>
    <button class="ptab"    id="tabWarmup"   onclick="showTab('warmup')">🔥 Calentamiento</button>
    <button class="ptab"    id="tabMain"     onclick="showTab('main')">💪 Entrenamiento</button>
  </div>

  <div class="scroll" id="mainScroll" style="background:var(--bg)">
    <div id="content" style="padding:14px"></div>
  </div>

  <div class="complete-wrap" id="completeWrap">
    <button class="btn btn-green" onclick="doComplete()">✅ Completar entrenamiento</button>
  </div>
</div>

<!-- Timer -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-sheet">
    <div class="timer-title">⏱ DESCANSO</div>
    <div class="timer-ex" id="timerEx">...</div>
    <div class="timer-num" id="timerNum">90</div>
    <div class="timer-lbl">segundos</div>
    <div class="timer-btns">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="skipTimer()">Saltar</button>
      <button class="btn btn-primary btn-sm" style="flex:1" id="pauseBtn" onclick="pauseTimer()">Pausar</button>
    </div>
  </div>
</div>

<!-- Celebrate -->
<div class="cel" id="celOverlay">
  <div class="cel-emo">🎉</div>
  <div class="cel-title" id="celTitle">¡Día completado!</div>
  <div class="cel-sub" id="celSub">Excelente trabajo.</div>
  <button class="btn btn-ghost" style="max-width:280px;margin-top:16px" onclick="window.location.href='dashboard.html'">🏠 Volver al inicio</button>
</div>

const TRAIN_TYPES = ['glutes','posterior','anterior'];
const NAMES = { glutes:'Glúteos 🍑', posterior:'Posterior 💪', anterior:'Anterior 🦵' };

function getDayInfo(d) {
  const wi = Math.floor((d-1)/7), di = (d-1)%7;
  const wn = wi+1, type = PATTERN[di];
  if(type==='rest') return {type:'rest', weekNum:wn, dayNum:d};
  const ti = [0,2,4].indexOf(di);
  const tt = TRAIN_TYPES[ti];
  return {type:'train', trainType:tt, weekNum:wn, dayNum:d, title:NAMES[tt]};
}

// ══════════════════════════════════════════════
// Función para adaptar ejercicios según lesiones
// ══════════════════════════════════════════════
function getAdaptedExercises(trainType, entorno, injuries) {
  const base = EXERCISES_BASE[trainType]?.[entorno] || EXERCISES_BASE[trainType]?.gym || [];
  const injSet = new Set(injuries || []);

  // Sin lesiones → plan completo
  if(injSet.size === 0 || injSet.has('ninguna')) return base.map(ex => ({...ex, adapted:false}));

  return base.map(ex => {
    // Prioridad: rodilla > lumbar > cadera > tobillo > postparto
    let mod = null;
    if(injSet.has('rodilla')   && ex.mod_rodilla)   mod = ex.mod_rodilla;
    else if(injSet.has('lumbar')    && ex.mod_lumbar)    mod = ex.mod_lumbar;
    else if(injSet.has('cadera')    && ex.mod_cadera)    mod = ex.mod_cadera;
    else if(injSet.has('tobillo')   && ex.mod_tobillo)   mod = ex.mod_tobillo;
    else if(injSet.has('postparto') && ex.mod_postparto) mod = ex.mod_postparto;

    if(!mod) return {...ex, adapted:false};

    // Si mod es null (ejercicio no recomendado) → saltar con alternativa segura
    if(mod === null) return {
      ...ex,
      name: ex.name + ' — EVITAR',
      ok: '⚠️ Este ejercicio no está recomendado con tu lesión. Habla con tu entrenador en el chat.',
      err: 'Consulta antes de intentarlo',
      tips: ['Ve al chat del entrenador para una alternativa personalizada'],
      adapted: true,
      adaptedName: 'Ejercicio no recomendado',
      injuryWarning: true,
    };

    return {
      ...ex,
      ...mod,
      emg: ex.emg, rest: ex.rest, driveId: ex.driveId,
      adapted: true,
      originalName: ex.name,
    };
  });
}

// INIT

async function init() {
  try {
    user = await AF.requireAuth('../index.html');
    if (!user) return;

    profile = await AF.getProfile(user.id);
    if (!profile) { window.location.href = 'onboarding.html'; return; }

    const params = new URLSearchParams(window.location.search);
    dayNum = parseInt(params.get('day') || sessionStorage.getItem('af_day') || '1');
    dayInfo = getDayInfo(dayNum);
    if (dayInfo.type === 'rest') { window.location.href = 'dashboard.html'; return; }

    const entorno = profile.entorno || 'gym';
    const injuries = profile.injuries || [];
    exercises = getAdaptedExercises(dayInfo.trainType, entorno, injuries);
    exercises.forEach((_, i) => { completedSets[i] = []; exerciseHistory[exercises[i].name] = []; });

    // Load history silently
    try {
      await Promise.all(exercises.map(ex =>
        AF.getLastSession(user.id, ex.name, dayInfo.weekNum)
          .then(d => { exerciseHistory[ex.name] = d || []; })
          .catch(() => {})
      ));
    } catch(e) {}

    // Header
    document.getElementById('shell').style.background = COLORS[dayInfo.trainType] || '#7c3aed';
    document.getElementById('hdrSub').textContent = `Semana ${dayInfo.weekNum} · Día ${dayNum} de 56`;
    document.getElementById('hdrTitle').textContent = dayInfo.title;
    document.getElementById('hdrBadge').textContent = `S${dayInfo.weekNum}`;

    showTab('method');

  } catch(e) {
    console.error(e);
    document.getElementById('hdrSub').textContent = '❌ ' + e.message;
    document.getElementById('content').innerHTML = `
      <div style="padding:32px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:15px;color:var(--text2);margin-bottom:20px">${e.message}</div>
        <a href="dashboard.html" style="padding:16px 28px;background:var(--primary);color:white;border-radius:14px;font-weight:800;text-decoration:none;font-size:16px">🏠 Volver al inicio</a>
      </div>`;
  }
}

function showTab(tab) {
  currentTab = tab;
  ['method','warmup','main'].forEach(t => {
    const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if(el) el.classList.toggle('on', t === tab);
  });
  const c = document.getElementById('content');
  document.getElementById('mainScroll').scrollTop = 0;
  document.getElementById('completeWrap').style.display = 'none';

  if (tab === 'method')  renderMethod(c);
  if (tab === 'warmup')  renderWarmup(c);
  if (tab === 'main')  { renderMain(c); checkComplete(); }
}

                    </div>
                    <div class="kg-suggest">
                      🚀 Sugerencia: intenta con <strong>${Math.round((lastKg + (lastKg>=30?2.5:1.25))*4)/4} kg</strong> si la semana pasada completaste todas las reps
                    </div>
                  ` : `<div style="font-size:14px;color:var(--text3);text-align:center;margin-top:10px;margin-bottom:8px">Primera vez — empieza con un peso cómodo y ajusta</div>`}
                  <div class="kg-row">
                    <button class="kg-btn" onclick="adjKg(${ei},${s.idx},-2.5)">−</button>
                    <div class="kg-in-wrap">
                      <input class="kg-in" type="number" id="kg-${ei}-${s.idx}"
                        value="${kg}" placeholder="${lastKg||'0'}" step="0.25" min="0"
                        oninput="saveKgInput(${ei},${s.idx},this.value)">
                      <span class="kg-in-unit">kg</span>
                    </div>
                    <button class="kg-btn" onclick="adjKg(${ei},${s.idx},2.5)">+</button>
                  </div>
                  <button class="complete-btn"
                    onclick="completeSerie(${ei},${s.idx},${ex.rest},'${ex.name}',${s.isAprox})">
                    ✓ Completé esta serie
                  </button>
                ` : ''}
              </div>
            `;
          }).join('')}

          <div style="margin-top:14px">
            ${ex.tips.map(t=>`<div style="font-size:14px;color:var(--text2);padding:5px 0;display:flex;gap:8px"><span>💡</span>${t}</div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('') + '<div style="height:20px"></div>';
}

function toggleEx(ei) {
  const body = document.getElementById(`eb-${ei}`);
  const chev = document.getElementById(`chev-${ei}`);
  body.classList.toggle('open');
  chev.classList.toggle('up', body.classList.contains('open'));
}

function adjKg(ei, si, delta) {
  const inp = document.getElementById(`kg-${ei}-${si}`);
  if(!inp) return;
  const val = Math.max(0, Math.round(((parseFloat(inp.value)||0) + delta) * 4) / 4);
  inp.value = val;
  saveKgInput(ei, si, val);
}

function saveKgInput(ei, si, val) {
  savedKg[`${ei}-${si}`] = parseFloat(val) || null;
}

async function completeSerie(ei, si, rest, exName, isAprox) {
  if((completedSets[ei]||[]).includes(si)) return;
  if(!completedSets[ei]) completedSets[ei] = [];
  completedSets[ei].push(si);

  // Save to DB silently
  try {
    await AF.saveSet(user.id, {
      day_num: dayNum, week_num: dayInfo.weekNum,
      exercise_name: exName, exercise_idx: ei,
      set_type: isAprox ? 'aprox' : 'efectiva',
      set_num: si, kg: savedKg[`${ei}-${si}`] || null,
    });
  } catch(e) {}

  // Re-render
  const c = document.getElementById('content');
  renderMain(c);
  checkComplete();

  // Timer only on efectivas
  if(!isAprox) startTimer(rest, exName);

  // Scroll to card
  setTimeout(() => {
    document.getElementById(`ec-${ei}`)?.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function checkComplete() {
  const allDone = exercises.every((_,i) => [2,3,4].every(s => (completedSets[i]||[]).includes(s)));
  document.getElementById('completeWrap').style.display = (currentTab==='main' && allDone) ? 'block' : 'none';
}

async function doComplete() {
  try {
    await AF.completeDay(user.id, dayNum);
    console.log('Day', dayNum, 'completed!');
  } catch(e) {
    console.error('Complete day error:', e);
  }
  const nextDay = dayNum + 1;
  const nextInfo = getDayInfo(nextDay);
  document.getElementById('celTitle').textContent = `¡Día ${dayNum} completado! 🎉`;
  document.getElementById('celSub').textContent = nextDay <= 56
    ? `${nextInfo.type==='rest'
        ? `Mañana es día de descanso — el músculo crece descansando. 💤`
        : `¡Mañana es día ${nextDay}! Descansa bien esta noche. 💪`}`
    : '¡Completaste el reto de 8 semanas! Eres increíble. 🏆';
  document.getElementById('celOverlay').classList.add('show');
}

// ══════════════════════════════
// TIMER
// ══════════════════════════════
function startTimer(secs, label) {
  clearInterval(timerInterval);
  timerSecs = secs; timerPaused = false;
  document.getElementById('timerEx').textContent = label;
  document.getElementById('timerNum').textContent = secs;
  document.getElementById('pauseBtn').textContent = 'Pausar';
  document.getElementById('timerOverlay').classList.add('show');
  timerInterval = setInterval(() => {
    if(timerPaused) return;
    timerSecs--;
    document.getElementById('timerNum').textContent = timerSecs;
    if(timerSecs <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timerOverlay').classList.remove('show');
      if(navigator.vibrate) navigator.vibrate([200,80,200]);
    }
  }, 1000);
}
function skipTimer() { clearInterval(timerInterval); document.getElementById('timerOverlay').classList.remove('show'); }
function pauseTimer() {
  timerPaused = !timerPaused;
  document.getElementById('pauseBtn').textContent = timerPaused ? 'Reanudar' : 'Pausar';
}

// Start
init();
</script>
<script src="../js/chatbubble.js"></script>
</body>
</html>
