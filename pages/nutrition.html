<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArjunaFit — Nutrición</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
*{box-sizing:border-box}
body{background:var(--bg)}

/* Header */
.nut-hdr{padding:18px 16px 32px;color:white;background:linear-gradient(135deg,#166534,#059669);position:relative;overflow:hidden;flex-shrink:0}
.nut-hdr::after{content:'🥗';position:absolute;right:-10px;bottom:-20px;font-size:110px;opacity:.08}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.back{width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:none;color:white}
.hdr-name{font-size:13px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:1px}
.hdr-title{font-size:26px;font-weight:900}
.hdr-sub{font-size:14px;opacity:.85;margin-top:3px}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:13px 6px;text-align:center;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:var(--green);border-bottom-color:var(--green)}

/* ══ TAB 1: HOY (Contador) ══════════════════════ */

/* Macro ring card - sticky top */
.macro-summary{background:var(--surface);border-bottom:1.5px solid var(--border);padding:14px 16px}
.ms-top{display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-remain{font-size:19px;font-weight:900;color:var(--text);line-height:1}
.ring-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-top:1px}
.bars{flex:1}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:13px;font-weight:700;color:var(--text2);width:58px;flex-shrink:0}
.bar-track{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .8s ease}
.bar-val{font-size:13px;font-weight:800;width:38px;text-align:right;flex-shrink:0}
.ms-bottom{display:flex;gap:6px;margin-top:10px}
.ms-chip{flex:1;background:var(--surface2);border-radius:10px;padding:8px;text-align:center;border:1.5px solid var(--border)}
.ms-chip-v{font-size:15px;font-weight:900;color:var(--primary)}
.ms-chip-l{font-size:11px;color:var(--text3);margin-top:2px}
.ms-chip.over .ms-chip-v{color:var(--red)}
.ms-chip.good .ms-chip-v{color:var(--green)}

/* Meal sections */
.meal-sec{background:var(--surface);border-bottom:1.5px solid var(--border)}
.meal-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.meal-ico{font-size:24px;flex-shrink:0}
.meal-name{flex:1;font-size:15px;font-weight:800;color:var(--text)}
.meal-kcal-badge{font-size:13px;font-weight:700;color:var(--text3)}
.meal-add-btn{width:34px;height:34px;border-radius:10px;background:var(--green-light);color:var(--green);font-size:22px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.meal-add-btn:active{transform:scale(.9)}
.meal-body{display:none;background:var(--surface2)}
.meal-body.open{display:block}
.food-logged{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)}
.food-logged:last-child{border-bottom:none}
.fl-ico{font-size:22px;flex-shrink:0;width:28px;text-align:center}
.fl-info{flex:1;min-width:0}
.fl-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fl-qty{font-size:12px;color:var(--text2);margin-top:2px}
.fl-kcal{font-size:14px;font-weight:800;color:var(--primary);flex-shrink:0}
.fl-del{width:28px;height:28px;border-radius:8px;background:var(--red-light);color:var(--red);font-size:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.meal-empty{padding:12px 16px;font-size:14px;color:var(--text3);text-align:center}

/* Food search modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
.modal-hdr{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:900;color:var(--text);flex:1}
.modal-close{width:34px;height:34px;border-radius:10px;background:var(--surface2);border:none;font-size:16px;cursor:pointer;color:var(--text)}
.search-wrap{padding:10px 14px;flex-shrink:0;position:relative}
.search-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 40px 11px 42px;font-family:var(--font);font-size:15px;color:var(--text);outline:none}
.search-inp:focus{border-color:var(--green)}
.si{position:absolute;left:26px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.si-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3)}
.cat-row{display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;flex-shrink:0}
.cat-row::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:6px 13px;background:var(--surface);border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.cat-pill.on{background:var(--green);border-color:var(--green);color:white}
.food-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.food-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.food-row:active{background:var(--surface2)}
.fr-ico{font-size:26px;width:32px;text-align:center;flex-shrink:0}
.fr-info{flex:1;min-width:0}
.fr-name{font-size:14px;font-weight:700;color:var(--text)}
.fr-meta{font-size:12px;color:var(--text2);margin-top:2px}
.fr-kcal{font-size:15px;font-weight:900;color:var(--green);flex-shrink:0;margin-right:4px}
.fr-add{width:34px;height:34px;border-radius:10px;background:var(--green);color:white;font-size:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.fr-add:active{transform:scale(.9)}
.usda-badge{font-size:10px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:1px 6px;border-radius:999px;margin-top:2px;display:inline-block}

/* Portion modal */
.portion-body{padding:16px}
.pb-name{font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px}
.pb-src{font-size:12px;color:var(--text3);margin-bottom:14px}
.pb-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.pm{background:var(--surface2);border-radius:10px;padding:10px;text-align:center}
.pm-v{font-size:16px;font-weight:900;color:var(--primary)}
.pm-l{font-size:11px;color:var(--text3);margin-top:2px}
.qty-row{display:flex;gap:8px;align-items:center;margin:12px 0}
.qty-btn{width:50px;height:50px;border-radius:12px;border:2px solid var(--border);background:var(--surface);font-size:24px;font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.qty-btn:active{transform:scale(.9);background:var(--green-light)}
.qty-inp{flex:1;padding:13px;border:2.5px solid var(--green);border-radius:12px;font-family:var(--font);font-size:22px;font-weight:900;color:var(--text);background:var(--surface);text-align:center;outline:none}
.quick-qty{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.qq-btn{padding:7px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:999px;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s}
.qq-btn.on{background:var(--green);border-color:var(--green);color:white}
.add-confirm-btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--green);color:white;font-family:var(--font);font-size:17px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:12px}
.add-confirm-btn:active{transform:scale(.97)}

/* Water */
.water-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1.5px solid var(--border)}
.water-drops{display:flex;gap:4px;flex:1}
.drop{font-size:20px;cursor:pointer;transition:all .2s;filter:grayscale(1);opacity:.35}
.drop.on{filter:grayscale(0);opacity:1;transform:scale(1.1)}
.water-lbl{font-size:13px;font-weight:700;color:var(--text2);flex-shrink:0}

/* ══ TAB 2: MI PLAN ════════════════════════════ */
.plan-sec{padding:0 14px 12px}
.plan-ttl{font-size:16px;font-weight:800;color:var(--text);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.meal-plan-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px}
.mp-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.mp-ico{font-size:24px}
.mp-name{flex:1;font-size:15px;font-weight:800;color:var(--text)}
.mp-kcal{font-size:13px;font-weight:700;color:var(--text3)}
.mp-arr{font-size:14px;color:var(--text3);transition:transform .2s}
.mp-arr.up{transform:rotate(180deg)}
.mp-body{display:none;border-top:1.5px solid var(--border);padding:12px 16px}
.mp-body.open{display:block}
.mp-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.mp-item:last-child{border-bottom:none}
.mp-item-ico{font-size:22px;width:28px;text-align:center}
.mp-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.mp-item-qty{font-size:13px;font-weight:800;color:var(--primary);background:var(--primary-light);padding:3px 8px;border-radius:7px}
.replaced-tag{font-size:11px;color:var(--green);font-weight:700;margin-top:2px}
.mp-tip{background:var(--primary-light);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13px;color:var(--primary);line-height:1.5}

/* Rules */
.rule-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.rule-item:last-child{border-bottom:none}
.rule-ico{font-size:22px;flex-shrink:0}
.rule-txt{font-size:14px;color:var(--text2);line-height:1.6}

/* Copy yesterday */
.copy-bar{display:flex;align-items:center;gap:12px;background:var(--primary-light);padding:12px 16px;cursor:pointer;border-bottom:1.5px solid var(--border)}
.copy-txt{flex:1;font-size:14px;font-weight:700;color:var(--primary)}

/* Misc */
.sec-lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 16px 4px;background:var(--bg)}
</style>
</head>

        </div>
        <div class="bar-row">
          <div class="bar-lbl">Grasas</div>

          <div class="bar-val" id="vFat" style="color:#7c3aed">0g</div>
        </div>
      </div>
    </div>
    <div class="ms-bottom">
      <div class="ms-chip" id="chipConsumed">
        <div class="ms-chip-v" id="cvConsumed">0</div>

      </div>
    </div>
  </div>

  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch" id="content"></div>

  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Inicio</a>
    <div class="nav-item on"><span class="ni">🍽️</span>Nutrición</div>
    <a href="guia.html" class="nav-item"><span class="ni">🥗</span>Guía</a>
    <a href="chat.html" class="nav-item"><span class="ni">🤖</span>Entrenador</a>
  </div>
</div>

<!-- Food Search Modal -->
<div class="modal-overlay" id="foodModal">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Agregar alimento</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="search-wrap">

    <div class="cat-row" id="catRow"></div>
    <div class="food-list" id="foodList"></div>
  </div>
</div>

<!-- Portion Modal -->

</div>

async function init() {
  try {
    const {data:{session}} = await _sb.auth.getSession();
    if(!session){window.location.href='../index.html';return}

    const {data:p} = await _sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
    profile = p;

    if(!profile){window.location.href='onboarding.html';return}

    // Set goals from profile
    goalKcal = Math.round(profile.calorias_objetivo || 2000);
    goalProt = Math.round(profile.proteina_g       || 150);
    goalCarb = Math.round(profile.carbs_g          || 220);
    goalFat  = Math.round(profile.grasas_g         || 65);

    const esH = profile.genero === 'hombre';
    const obj = profile.objetivo || 'crecer';
    const nombre = profile.nombre || (esH ? 'Atleta' : 'Campeona');

    document.getElementById('hdrName').textContent = `Plan de ${nombre}`;
    document.getElementById('hdrTitle').textContent = `Nutrición ${obj==='crecer'?'🍑':'🔥'}`;
    document.getElementById('hdrSub').textContent = `${goalKcal.toLocaleString()} kcal/día · ${goalProt}g prot · ${goalCarb}g carb · ${goalFat}g grasa`;

    // Change header color by objective
    document.querySelector('.nut-hdr').style.background = obj==='crecer'
      ? 'linear-gradient(135deg,#166534,#059669)'
      : 'linear-gradient(135deg,#991b1b,#dc2626)';

    // Load log from localStorage
    const saved = localStorage.getItem(`af_log_${todayKey}`);
    log = saved ? JSON.parse(saved) : {};
    MEALS.forEach(m=>{ if(!log[m.id]) log[m.id]=[]; });

    const savedW = localStorage.getItem(`af_water_${todayKey}`);
    water = savedW ? parseInt(savedW) : 0;

    showTab('hoy', document.querySelector('.tab'));

  } catch(e) {
    console.error('Nutrition init error:', e);
    document.getElementById('hdrSub').textContent = '❌ ' + e.message;
  }
}

function renderHoy(c) {
  updateMacroRing();

  const yesterdayLog = JSON.parse(localStorage.getItem(`af_log_${yesterdayKey}`)||'{}');
  const hasYesterday = Object.values(yesterdayLog).some(a=>a.length>0);

  c.innerHTML = `
    <!-- Water -->
    <div class="water-bar">
      <span style="font-size:14px;font-weight:700;color:var(--text)">💧 Agua</span>
      <div class="water-drops" id="waterDrops"></div>
      <div class="water-lbl" id="waterLbl">0/8</div>
    </div>

    <!-- Copy yesterday -->
    ${hasYesterday ? `
      <div class="copy-bar" onclick="copyYesterday()">
        <div style="font-size:20px">📋</div>
        <div class="copy-txt">Copiar comidas de ayer</div>
        <div style="font-size:18px;color:var(--primary)">→</div>
      </div>` : ''}

    <!-- Meals -->
    ${MEALS.map(meal=>{
      const items = log[meal.id]||[];
      const mKcal = Math.round(items.reduce((s,{food,mult})=>s+food.kcal*mult,0));
      return `
        <div class="sec-lbl">${meal.time}</div>
        <div class="meal-sec">
          <div class="meal-hdr" onclick="toggleMeal('mb-${meal.id}')">
            <div class="meal-ico">${meal.ico}</div>
            <div class="meal-name">${meal.name}</div>
            ${mKcal>0?`<div class="meal-kcal-badge">${mKcal} kcal</div>`:''}
            <button class="meal-add-btn" onclick="event.stopPropagation();openModal('${meal.id}')">+</button>
          </div>
          <div class="meal-body ${items.length>0?'open':''}" id="mb-${meal.id}">
            ${items.length===0
              ? `<div class="meal-empty">Toca + para agregar</div>`
              : items.map((item,idx)=>{
                  const kcal=Math.round(item.food.kcal*item.mult);
                  const prot=Math.round(item.food.prot*item.mult*10)/10;
                  const qty=fmtQty(item.food,item.mult);
                  return `<div class="food-logged">
                    <div class="fl-ico">${item.food.ico}</div>
                    <div class="fl-info">
                      <div class="fl-name">${item.food.name}</div>
                      <div class="fl-qty">${qty} · ${prot}g prot</div>
                    </div>
                    <div class="fl-kcal">${kcal} kcal</div>
                    <button class="fl-del" onclick="removeFood('${meal.id}',${idx})">🗑</button>
                  </div>`;
                }).join('')}
          </div>
        </div>`;
    }).join('')}
    <div style="height:20px"></div>
  `;

  renderWater();
}

function updateMacroRing() {
  let tK=0,tP=0,tC=0,tF=0,tN=0;
  Object.values(log).forEach(items=>{
    items.forEach(({food,mult})=>{
      tK+=food.kcal*mult; tP+=food.prot*mult;
      tC+=food.carb*mult; tF+=food.fat*mult; tN++;
    });
  });
  tK=Math.round(tK); tP=Math.round(tP); tC=Math.round(tC); tF=Math.round(tF);
  const remain=Math.max(0,goalKcal-tK);
  const pct=Math.min(1,tK/goalKcal);

  document.getElementById('ringFill').style.strokeDashoffset = 220*(1-pct);
  document.getElementById('ringFill').style.stroke = pct>1?'#dc2626':pct>.85?'#d97706':'#059669';
  document.getElementById('ringRemain').textContent = remain>0?remain.toLocaleString():'✓';

  document.getElementById('bProt').style.width = Math.min(100,Math.round(tP/goalProt*100))+'%';
  document.getElementById('bCarb').style.width = Math.min(100,Math.round(tC/goalCarb*100))+'%';
  document.getElementById('bFat').style.width  = Math.min(100,Math.round(tF/goalFat*100))+'%';
  document.getElementById('vProt').textContent = tP+'g';
  document.getElementById('vCarb').textContent = tC+'g';
  document.getElementById('vFat').textContent  = tF+'g';

  document.getElementById('cvConsumed').textContent = tK.toLocaleString();
  document.getElementById('cvGoal').textContent = goalKcal.toLocaleString();
  document.getElementById('cvLeft').textContent = remain>0?remain.toLocaleString():'¡Meta!';
  document.getElementById('cvFoods').textContent = tN;

  const chipLeft = document.getElementById('chipLeft');
  chipLeft.className = 'ms-chip '+(remain===0?'good':tK>goalKcal?'over':'');
}

window.copyYesterday = () => {
  const yLog = JSON.parse(localStorage.getItem(`af_log_${yesterdayKey}`)||'{}');
  if(!Object.values(yLog).some(a=>a.length>0)) return;
  if(!confirm('¿Copiar todas las comidas de ayer a hoy?')) return;
  MEALS.forEach(m=>{ log[m.id]=[...(yLog[m.id]||[])]; });

// Water
function renderWater() {
  const drops = document.getElementById('waterDrops');
  if(!drops) return;
  drops.innerHTML = Array.from({length:8},(_,i)=>
    `<div class="drop ${i<water?'on':''}" onclick="setWater(${i+1})">💧</div>`
  ).join('');
  document.getElementById('waterLbl').textContent = `${water}/8`;
  localStorage.setItem(`af_water_${todayKey}`, water);
}
window.setWater = (n) => { water = water===n?n-1:n; renderWater(); };

function fmtQty(food, mult) {
  const q = food.base * mult;
  if(food.unit==='g') return `${Math.round(q)}g`;
  if(food.unit==='ml') return `${Math.round(q)}ml`;
  const r = q%1===0?q:q.toFixed(1);
  return `${r} ${food.unit}`;
}

async function fetchUSDA(q) {
  const listEl = document.getElementById('foodList');
  // Add loading at bottom
  const loadId = 'usda-load';
  if(!document.getElementById(loadId)) {
    listEl.insertAdjacentHTML('beforeend',
      `<div id="${loadId}" style="text-align:center;padding:12px;font-size:13px;color:var(--text3)">🔍 Buscando en USDA (600k+ alimentos)...</div>`);
  }
  try {
    const r = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&pageSize=12&api_key=DEMO_KEY`);
    const data = await r.json();
    document.getElementById(loadId)?.remove();
    const usdaFoods = (data.foods||[]).map(usdaConvert);
    renderFoodList(q, usdaFoods);
  } catch(e) {
    document.getElementById(loadId)?.remove();
  }
}

function usdaConvert(item) {
  const get = (n) => (item.foodNutrients||[]).find(x=>x.nutrientName?.toLowerCase().includes(n.toLowerCase()))?.value||0;
  const d = (item.description||'').toLowerCase();
  const ico = d.includes('chicken')?'🍗':d.includes('fish')||d.includes('salmon')||d.includes('tuna')||d.includes('tilapia')?'🐟':
              d.includes('egg')?'🥚':d.includes('beef')||d.includes('meat')?'🥩':
              d.includes('yogurt')?'🫙':d.includes('milk')?'🥛':d.includes('rice')||d.includes('arroz')?'🍚':
              d.includes('banana')?'🍌':d.includes('broccoli')?'🥦':d.includes('avocado')?'🥑':'🍽️';
  const f = {
    id:'usda_'+item.fdcId,ico,name:item.description,cat:'usda',unit:'g',base:100,
    kcal:Math.round(get('energy')||get('Energy')||0),
    prot:Math.round((get('Protein')||0)*10)/10,
    carb:Math.round((get('Carbohydrate')||0)*10)/10,
    fat:Math.round((get('Total lipid')||get('Fat')||0)*10)/10,
    source:'usda'
  };
  FOOD_CACHE[f.id] = f;
  return f;
}

function renderFoodList(q, usdaFoods) {
  const listEl = document.getElementById('foodList');
  let local = LOCAL_FOODS;
  if(catFilter!=='all') local = local.filter(f=>f.cat===catFilter);
  if(q) local = local.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));

  if(!q && catFilter==='all') {
    listEl.innerHTML = `
      <div style="padding:10px 16px 4px;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px">⭐ Frecuentes</div>
      ${LOCAL_FOODS.slice(0,8).map(foodRowHTML).join('')}
      <div style="text-align:center;padding:14px;font-size:13px;color:var(--text3)">🔍 Escribe para buscar en 600k+ alimentos</div>`;
    return;
  }

  const usdaUnique = usdaFoods.filter(u=>!local.some(l=>l.name.toLowerCase()===u.name.toLowerCase()));
  const localHTML = local.length ? `
    <div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px">🇨🇴 Colombianos (${local.length})</div>
    ${local.map(foodRowHTML).join('')}` : '';

  const usdaHTML = usdaUnique.length ? `
    <div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px">🔬 USDA verificado (${usdaUnique.length})</div>
    ${usdaUnique.map(foodRowHTML).join('')}` : '';

  listEl.innerHTML = (localHTML||usdaHTML)
    ? localHTML + usdaHTML
    : `<div style="text-align:center;padding:32px;color:var(--text3)">Sin resultados para "${q}"<br><span style="font-size:13px">Intenta en inglés</span></div>`;
}

function renderPortionBody(mult) {

  document.getElementById('portionBody').innerHTML = `
    <div class="pb-name">${f.ico} ${f.name}</div>
    <div class="pb-src">${f.source==='usda'?'🔬 USDA FoodData Central':'🇨🇴 Base de datos ArjunaFit'}</div>
    <div class="pb-macros">
      <div class="pm"><div class="pm-v">${k}</div><div class="pm-l">kcal</div></div>
      <div class="pm"><div class="pm-v">${p}g</div><div class="pm-l">prot</div></div>
      <div class="pm"><div class="pm-v">${c}g</div><div class="pm-l">carb</div></div>
      <div class="pm"><div class="pm-v">${g}g</div><div class="pm-l">grasa</div></div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:8px">
      Porciones <span style="color:var(--text3);font-weight:500">(1 = ${f.base} ${f.unit})</span>
    </div>
    <div class="quick-qty">
      ${[0.5,1,1.5,2,3].map(q=>`<div class="qq-btn ${mult===q?'on':''}" onclick="setMult(${q})">${q}x</div>`).join('')}
    </div>
    <div class="qty-row">
      <button class="qty-btn" onclick="adjMult(-.5)">−</button>
      <input class="qty-inp" id="multInp" type="number" min=".25" step=".25" value="${mult}" oninput="onMultInput(this.value)">
      <button class="qty-btn" onclick="adjMult(.5)">+</button>
    </div>
    ${(f.unit==='g'||f.unit==='ml')?`<div style="text-align:center;font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px">${Math.round(f.base*mult)}${f.unit} en total</div>`:''}
    <button class="add-confirm-btn" onclick="confirmAdd()">✓ Agregar — ${k} kcal · ${p}g prot</button>
  `;
}

window.setMult = (m) => { currentMult=m; document.getElementById('multInp').value=m; renderPortionBody(m); };
window.adjMult = (d) => { currentMult=Math.max(.25,Math.round((currentMult+d)*4)/4); document.getElementById('multInp').value=currentMult; renderPortionBody(currentMult); };
window.onMultInput = (v) => { currentMult=Math.max(.25,parseFloat(v)||1); renderPortionBody(currentMult); };
window.confirmAdd = () => {
  if(!selectedFood||!activeMeal) return;
  log[activeMeal].push({food:selectedFood, mult:currentMult});
  currentMult=1; saveLog(); closePortionModal(); closeModal();
  renderHoy(document.getElementById('content'));
};

     items:[{ico:'🐟',n:'Tilapia o pechuga',q:`${esH?'180g':'160g'}`},{ico:'🥦',n:'Verduras salteadas',q:'1 taza'},{ico:'🫘',n:'Lentejas o fríjoles',q:'½ taza cocida'}],
     tip:'Cena antes de las 8pm. Proteína y vegetales, sin excesos de carbohidrato.'},
  ] : [
    {ico:'🌅',name:'Desayuno',time:'7:00 am',kcalPct:.20,
     items:[{ico:'🥚',n:'Claras de huevo + 1 entero',q:`${esH?'5 claras':'4 claras'}`},{ico:'🫓',n:'Pan integral',q:'1 tajada'},{ico:'🍅',n:'Tomate y espinaca',q:'Al gusto'},{ico:'☕',n:'Café negro sin azúcar',q:'1 taza'}],
     tip:'Saltarse el desayuno aumenta el cortisol y el hambre. Siempre desayuna.'},
    {ico:'🍓',name:'Merienda mañana',time:'10:00 am',kcalPct:.12,
     items:[{ico:'🫙',n:'Yogur griego natural',q:'200g'},{ico:'🍓',n:'Fresas o moras',q:'½ taza'},{ico:'🥜',n:'Almendras',q:'10-12 unidades'}],
     tip:'Fruta de bajo índice glucémico + proteína = merienda perfecta.'},
    {ico:'☀️',name:'Almuerzo',time:'1:00 pm',kcalPct:.30,
     items:[{ico:'🍗',n:'Pechuga al horno',q:`${esH?'180g':'160g'}`},{ico:'🍚',n:'Arroz integral',q:'½ taza cocida'},{ico:'🥦',n:'Vegetales al vapor',q:'Sin límite'},{ico:'🍋',n:'Limón y aceite de oliva',q:'Al gusto'}],
     tip:'Empieza con la ensalada — llena el estómago con pocas calorías.'},
    {ico:'⚡',name:'Merienda tarde',time:'4:30 pm',kcalPct:.13,
     items:[{ico:'🥛',n:'Batido proteína con agua',q:'1 scoop + 300ml'},{ico:'🍎',n:'Manzana pequeña',q:'1 unidad'}],
     tip:'Solo si entrenaste. Si no, esta merienda es opcional.'},
    {ico:'🌙',name:'Cena',time:'7:30 pm',kcalPct:.25,
     items:[{ico:'🐟',n:'Tilapia o corvina al vapor',q:`${esH?'160g':'140g'}`},{ico:'🥦',n:'Vegetales al vapor',q:'Sin límite'},{ico:'🍲',n:'Caldo de pollo natural',q:'1 taza'}],
     tip:'La más ligera del día. Tu cuerpo no necesita mucha energía por la noche.'},
  ];

  c.innerHTML = `<div class="plan-sec">
    <div style="background:var(--primary-light);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-top:14px;margin-bottom:4px;font-size:14px;color:var(--primary);line-height:1.5">
      📋 Este es tu plan recomendado para <strong>${obj==='crecer'?'crecer y tonificar':'bajar grasa'}</strong>.
      Úsalo como guía y registra lo que comiste en la pestaña <strong>🔥 Hoy</strong>.
    </div>
    ${MEALS_PLAN.map((m,i)=>`
      <div class="meal-plan-card" style="margin-top:8px">
        <div class="mp-hdr" onclick="togglePlanMeal('pm-${i}','pa-${i}')">
          <div class="mp-ico">${m.ico}</div>
          <div>
            <div class="mp-name">${m.name}</div>
            <div style="font-size:12px;color:var(--text3)">${m.time} · ~${Math.round(goalKcal*m.kcalPct)} kcal</div>
          </div>
          <div class="mp-arr" id="pa-${i}">▾</div>
        </div>
        <div class="mp-body" id="pm-${i}">
          ${m.items.map(item=>`
            <div class="mp-item">
              <div class="mp-item-ico">${item.ico}</div>
              <div style="flex:1"><div class="mp-item-name">${item.n}</div></div>
              <div class="mp-item-qty">${item.q}</div>
            </div>`).join('')}
          <div class="mp-tip">💡 ${m.tip}</div>
          <button style="width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;background:var(--green);color:white;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer"
            onclick="goToMealLog('${MEALS[i]?.id||MEALS[0].id}')">
            ➕ Agregar a mi registro de hoy
          </button>
        </div>
      </div>`).join('')}
    <div style="height:80px"></div>
  </div>`;
}

window.goToMealLog = (mealId) => {
  // Switch to Hoy tab first
  const tabEl = document.querySelector('.tab');
  showTab('hoy', tabEl);
  // Wait for render then open modal
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      openModal(mealId);
    });
  });
};
  document.getElementById(bodyId)?.classList.toggle('open');
  const arr=document.getElementById(arrId);
  if(arr) arr.classList.toggle('up');
};

    {ico:'🥩',txt:`Tu objetivo es ${goalProt}g de proteína al día. Es tu número más importante.`},

    {ico:'😴',txt:'Duerme bien. El cortisol alto por mal sueño acumula grasa abdominal.'},

    {ico:'📊',txt:'Pésate siempre en ayunas, el mismo día. El peso fluctúa 1-2kg normal.'},
  ];
  c.innerHTML=`
    <div style="margin:14px 14px 0;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px">
      <div style="font-size:16px;font-weight:900;color:var(--text);margin-bottom:12px">
        💡 Tus reglas para ${obj==='crecer'?(esH?'ganar masa muscular':'crecer y tonificar'):(esH?'bajar grasa':'bajar grasa y tonificar')}
      </div>
      ${rules.map(r=>`<div class="rule-item"><div class="rule-ico">${r.ico}</div><div class="rule-txt">${r.txt}</div></div>`).join('')}
    </div>
    <div style="margin:12px 14px 100px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px">
      <div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px">📊 Tus macros objetivo</div>
      ${[['🔥 Calorías',goalKcal+' kcal'],['🥩 Proteína',goalProt+'g'],['🌾 Carbohidratos',goalCarb+'g'],['🥑 Grasas',goalFat+'g']].map(([l,v])=>`
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:14px;color:var(--text2)">${l}</span>
          <span style="font-size:15px;font-weight:900;color:var(--primary)">${v}</span>

      <div style="font-size:13px;color:var(--text3);margin-top:10px;line-height:1.5">
