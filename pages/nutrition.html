<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArjunaFit — Nutrición</title>

<script src="../js/theme.js"></script>
<link rel="stylesheet" href="../css/app.css">
<style>
body { background: var(--bg); }

.nut-hdr {
  padding: 20px 16px 36px;
  color: white;
  background: linear-gradient(135deg,#166534,#059669);
  position: relative; overflow: hidden;
}
.back { width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:none;color:white }
.hdr-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px }
.hdr-eye { font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;opacity:.8 }
.hdr-title { font-size:30px;font-weight:900;letter-spacing:-.5px }
.hdr-sub { font-size:15px;opacity:.85;margin-top:4px }

/* Macro card */
.macro-card {
  margin: -20px 14px 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 18px 16px;
  position: relative; z-index: 2;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}
.macro-lbl { font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:14px }
.macro-row { display:flex;align-items:center;gap:16px }
.ring-wrap { position:relative;flex-shrink:0 }
.ring-center { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center }
.ring-kcal { font-size:20px;font-weight:900;color:var(--text);line-height:1 }
.ring-unit { font-size:12px;color:var(--text3);font-weight:600 }
.bars { flex:1;display:flex;flex-direction:column;gap:10px }
.bar-row { display:flex;align-items:center;gap:10px }
.bar-lbl { font-size:14px;font-weight:700;color:var(--text2);width:60px;flex-shrink:0 }
.bar-track { flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden }
.bar-fill { height:100%;border-radius:99px;transition:width 1s ease }
.bar-val { font-size:14px;font-weight:800;color:var(--text);width:40px;text-align:right;flex-shrink:0 }

/* Timeline */
.tl-section { padding:16px 14px 20px }
.tl-ttl { font-size:17px;font-weight:900;color:var(--text);margin-bottom:14px }

.tl-row { display:flex;gap:12px;margin-bottom:8px }
.tl-left { display:flex;flex-direction:column;align-items:center;width:52px;flex-shrink:0 }
.tl-time { font-size:13px;font-weight:800;color:var(--primary);background:var(--primary-light);padding:5px 4px;border-radius:8px;text-align:center;width:52px;line-height:1.2 }
.tl-line { width:2px;flex:1;background:var(--border);margin:4px 0;min-height:16px }
.tl-row:last-child .tl-line { display:none }

/* Meal card */
.meal-card { flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;cursor:pointer }
.meal-top { padding:14px 16px;display:flex;align-items:center;gap:12px }
.meal-icon { font-size:32px;flex-shrink:0 }
.meal-name { font-size:15px;font-weight:800;color:var(--text) }
.chips { display:flex;gap:5px;margin-top:5px;flex-wrap:wrap }
.chip { font-size:12px;font-weight:700;padding:2px 8px;border-radius:99px }
.chip-k { background:var(--gold-light);color:var(--gold) }
.chip-p { background:rgba(220,38,38,.08);color:var(--red) }
.chip-c { background:rgba(5,150,105,.08);color:var(--green) }
.chip-f { background:var(--primary-light);color:var(--primary) }
.meal-arr { font-size:16px;color:var(--text3);margin-left:auto;flex-shrink:0;transition:transform .2s }
.meal-arr.up { transform:rotate(180deg) }

/* Portions */
.portions { display:none;border-top:1.5px solid var(--border);padding:12px 16px }
.portions.open { display:block }
.portions-ttl { font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px }
.portion-row { display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border) }
.portion-row:last-child { border-bottom:none }
.p-ico { font-size:26px;width:32px;text-align:center;flex-shrink:0 }
.p-name { font-size:14px;font-weight:700;color:var(--text);flex:1 }
.p-qty { font-size:13px;font-weight:800;color:var(--primary);background:var(--primary-light);padding:4px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0 }
.p-replaced { font-size:12px;color:var(--green);font-weight:700 }
.meal-tip { display:flex;gap:8px;padding:10px 12px;background:var(--surface2);font-size:14px;color:var(--text2);line-height:1.5;margin-top:6px;border-radius:10px }

/* Guide link */
.guide-link { display:flex;align-items:center;gap:12px;background:var(--primary-light);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin:0 14px 14px;text-decoration:none;cursor:pointer }
.gl-ttl { font-size:14px;font-weight:800;color:var(--primary) }
.gl-sub { font-size:13px;color:var(--text2);margin-top:2px }

/* Rules */
.rules-sec { margin:0 14px 100px }
.rules-ttl { font-size:16px;font-weight:900;color:var(--text);margin-bottom:12px }
.rule-row { display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border) }
.rule-row:last-child { border-bottom:none }
.rule-ico { font-size:22px;flex-shrink:0 }
.rule-txt { font-size:14px;color:var(--text2);line-height:1.6 }

/* Nav */
.bottom-nav { display:flex;background:var(--surface);border-top:2px solid var(--border);padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:50 }
.nav-item { flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:var(--font);text-decoration:none;transition:color .2s;min-height:52px;justify-content:center }
.nav-item .ni { font-size:26px;line-height:1 }

</style>
</head>

      <div id="rulesBody"></div>
    </div>
  </div>

    <div class="bottom-nav">

<script>
// ── Init Supabase directly ──
const _sb = supabase.createClient(
  'https://egswsqymkxmbtcpnozcq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnc3dzcXlta3htYnRjcG5vemNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjAzODIsImV4cCI6MjA5Mjg5NjM4Mn0.yIcQ7c4QF8wv0Dvtvaien5e-gi12CiruOBbYTeQRusM'
);

// ══════════════════════════
// DATA
// ══════════════════════════
const MEALS_CRECER = [
  {time:'07:00', name:'Desayuno',        icon:'🥚', pct:.22},
  {time:'10:00', name:'Merienda mañana', icon:'🥣', pct:.15},
  {time:'13:00', name:'Almuerzo',        icon:'🍗', pct:.30},
  {time:'16:30', name:'Merienda tarde',  icon:'🥛', pct:.13},
  {time:'19:30', name:'Cena',            icon:'🐟', pct:.20},
];
const MEALS_BAJAR = [
  {time:'07:00', name:'Desayuno',        icon:'🍳', pct:.20},
  {time:'10:00', name:'Merienda mañana', icon:'🍓', pct:.12},
  {time:'13:00', name:'Almuerzo',        icon:'🥙', pct:.30},
  {time:'16:30', name:'Merienda tarde',  icon:'🥛', pct:.13},
  {time:'19:30', name:'Cena',            icon:'🐟', pct:.25},
];

const TIPS_CRECER = {
  'Desayuno':       'Desayuna en la primera hora. El metabolismo es más activo en la mañana.',
  'Merienda mañana':'Come a las 10am aunque no tengas hambre. Mantén el metabolismo activo.',
  'Almuerzo':       'Tu comida más importante. No la saltes ni la reduzcas.',
  'Merienda tarde': 'Toma esta merienda máximo 30 min después de entrenar.',
  'Cena':           'Cena antes de las 8pm. Proteína y vegetales, sin excesos.',
};
const TIPS_BAJAR = {
  'Desayuno':       'Desayuna siempre. Saltarlo aumenta el hambre y el cortisol.',
  'Merienda mañana':'Come algo pequeño. Evita llegar con mucha hambre al almuerzo.',
  'Almuerzo':       'Empieza con la ensalada — llena el estómago con pocas calorías.',
  'Merienda tarde': 'Solo si entrenas. Si no, esta merienda es opcional.',
  'Cena':           'La más liviana. Tu cuerpo no necesita energía por la noche.',
};

function getPortions(meal, kcal, obj, restr) {
  const s = Math.max(.6, kcal/500);
  const R = restr || [];
  const db = {
    'Desayuno': {
      crecer:[
        {ico:'🥚',n:'Huevos revueltos con espinaca',q:`${Math.max(2,Math.round(2*s+1))} huevos`},
        {ico:'🫓',n:'Arepa de maíz o pan integral',  q:`${Math.max(1,Math.round(s+.5))} unidad(es)`},
        {ico:'🍌',n:'Banano',                         q:'1 unidad mediana'},
        {ico:'☕',n:'Café o aromática sin azúcar',    q:'1 taza'},
      ],
      bajar:[
        {ico:'🥚',n:'Claras de huevo + 1 entero',q:`${Math.max(3,Math.round(3*s))} claras`},
        {ico:'🫓',n:'Pan integral',               q:'1 tajada'},
        {ico:'🍅',n:'Tomate y cebolla salteados', q:'Libre'},
        {ico:'☕',n:'Café negro sin azúcar',       q:'1 taza'},
      ],
    },
    'Merienda mañana': {
      crecer:[
        {ico:'🥣',n:'Avena en hojuelas',    q:`${Math.max(40,Math.round(50*s))}g`},
        {ico:'🥜',n:'Mantequilla de maní',  q:'1 cucharada'},
        {ico:'🍎',n:'Manzana o pera',       q:'1 unidad'},
      ],
      bajar:[
        {ico:'🫙',n:'Yogur griego natural', q:'200g'},
        {ico:'🍓',n:'Fresas o papaya',      q:'½ taza'},
        {ico:'🥜',n:'Almendras',            q:'12 unidades'},
      ],
    },
    'Almuerzo': {
      crecer:[
        {ico:'🍗',n:'Pechuga de pollo a la plancha', q:`${Math.max(150,Math.round(180*s))}g`},
        {ico:'🍚',n:'Arroz integral',                q:'1 taza cocida'},
        {ico:'🥑',n:'Aguacate',                      q:'½ unidad'},
        {ico:'🥗',n:'Ensalada verde',                q:'Sin límite'},
        {ico:'🫘',n:'Fríjoles o lentejas (opcional)',q:'½ taza cocida'},
      ],
      bajar:[
        {ico:'🍗',n:'Pechuga de pollo al horno', q:`${Math.max(150,Math.round(160*s))}g`},
        {ico:'🍚',n:'Arroz integral',             q:'½ taza cocida'},
        {ico:'🥦',n:'Vegetales al vapor',         q:'Sin límite'},
        {ico:'🍋',n:'Limón y aceite de oliva',    q:'Al gusto'},
      ],
    },
    'Merienda tarde': {
      crecer:[
        {ico:'🥛',n:'Batido de proteína',q:'1 scoop con leche o agua'},
        {ico:'🍌',n:'Banano maduro',     q:'1 unidad'},
      ],
      bajar:[
        {ico:'🥛',n:'Batido de proteína con agua',q:'1 scoop + 300ml agua'},
        {ico:'🍎',n:'Manzana o mandarina',         q:'1 unidad pequeña'},
      ],
    },
    'Cena': {
      crecer:[
        {ico:'🐟',n:'Tilapia, salmón o pechuga', q:`${Math.max(150,Math.round(160*s))}g`},
        {ico:'🥦',n:'Verduras salteadas',         q:'1 taza'},
        {ico:'🫘',n:'Lentejas, fríjoles o quinoa',q:'½ taza cocida'},
        {ico:'🫒',n:'Aceite de oliva',             q:'1 cucharadita'},
      ],
      bajar:[
        {ico:'🐟',n:'Tilapia o corvina al vapor', q:`${Math.max(130,Math.round(140*s))}g`},
        {ico:'🥦',n:'Vegetales al vapor',          q:'Sin límite'},
        {ico:'🍲',n:'Caldo de pollo natural',      q:'1 taza'},
      ],
    },
  };

  let portions = (db[meal]?.[obj] || []).map(p => ({ico:p.ico, name:p.n, qty:p.q}));

  // Apply restrictions
  if(R.length === 0) return portions;
  const rSet = new Set(R);
  return portions.map(p => {
    const nl = p.name.toLowerCase();
    if(rSet.has('vegano')) {
      if(nl.includes('huevo')||nl.includes('clara')) return {ico:'🫘',name:'Tofu firme revuelto',qty:'150g',replaced:true};
      if(nl.includes('pollo')||nl.includes('pechuga')) return {ico:'🫘',name:'Tofu o tempeh',qty:'150g',replaced:true};
      if(nl.includes('tilapia')||nl.includes('pescado')||nl.includes('atún')) return {ico:'🌱',name:'Soja texturizada',qty:'80g seca',replaced:true};
      if(nl.includes('yogur')) return {ico:'🥥',name:'Yogur de coco natural',qty:'200g',replaced:true};
    }
    if(rSet.has('vegetariano')) {
      if(nl.includes('pollo')||nl.includes('pechuga')) return {ico:'🥚',name:'Huevos enteros',qty:'3 huevos',replaced:true};
      if(nl.includes('tilapia')||nl.includes('salmón')||nl.includes('corvina')) return {ico:'🫘',name:'Lentejas o fríjoles',qty:'1 taza cocida',replaced:true};
    }
    if(rSet.has('huevo') && (nl.includes('huevo')||nl.includes('clara'))) return {ico:'🫙',name:'Yogur griego natural',qty:'200g',replaced:true};
    if(rSet.has('pollo') && (nl.includes('pollo')||nl.includes('pechuga'))) return {ico:'🐟',name:'Tilapia al horno',qty:'150g',replaced:true};
    if(rSet.has('pescado') && (nl.includes('tilapia')||nl.includes('corvina')||nl.includes('salmón'))) return {ico:'🍗',name:'Pechuga de pollo',qty:'150g',replaced:true};
    if(rSet.has('lacteos') && nl.includes('yogur')) return {ico:'🥛',name:'Bebida de almendra',qty:'250ml',replaced:true};
    if(rSet.has('mani') && nl.includes('maní')) return {ico:'🥑',name:'Aguacate',qty:'¼ unidad',replaced:true};
    if(rSet.has('aguacate') && nl.includes('aguacate')) return {ico:'🥜',name:'Almendras',qty:'15 unidades',replaced:true};
    if(rSet.has('arroz') && nl.includes('arroz')) return {ico:'🍠',name:'Batata o papa cocida',qty:'1 mediana',replaced:true};
    if(rSet.has('platano') && nl.includes('banano')) return {ico:'🍎',name:'Manzana o pera',qty:'1 unidad',replaced:true};
    if(rSet.has('avena') && nl.includes('avena')) return {ico:'🌽',name:'Arepa de maíz',qty:'2 unidades',replaced:true};
    return p;
  });
}

// ══════════════════════════
// INIT
// ══════════════════════════
async function init() {
  try {
    // Auth
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) { window.location.href = '../index.html'; return; }

    // Profile
    const { data: profile, error: pErr } = await _sb
      .from('profiles').select('*').eq('id', session.user.id).maybeSingle();

    if (pErr) { showError('Error de base de datos: ' + pErr.message); return; }
    if (!profile) { window.location.href = 'onboarding.html'; return; }

    // Compute macros
    const obj   = profile.objetivo || 'crecer';
    const esH   = profile.genero === 'hombre';
    const kcal  = Math.round(profile.calorias_objetivo  || (obj==='crecer' ? 2200 : 1700));
    const protG = Math.round(profile.proteina_g         || (obj==='crecer' ?  150 :  140));
    const carbG = Math.round(profile.carbs_g            || (obj==='crecer' ?  240 :  160));
    const fatG  = Math.round(profile.grasas_g           || (obj==='crecer' ?   70 :   55));
    const total = protG*4 + carbG*4 + fatG*9 || 1;
    const pctP  = Math.round(protG*4/total*100);
    const pctC  = Math.round(carbG*4/total*100);
    const pctF  = 100 - pctP - pctC;
    const circ  = 226;

    // Header
    const bg = obj==='crecer'
      ? 'linear-gradient(135deg,#166534,#059669)'
      : 'linear-gradient(135deg,#991b1b,#dc2626)';
    document.getElementById('nutHdr').style.background = bg;
    document.getElementById('hdrEye').textContent = `Plan de ${profile.nombre || (esH?'Atleta':'Campeona')}`;
    document.getElementById('hdrTitle').textContent = `Nutrición ${obj==='crecer'?'🍑':'🔥'}`;
    document.getElementById('hdrSub').textContent  =
      `${obj==='crecer'?'Crecer y Tonificar':'Bajar Grasa y Tonificar'} · ${kcal.toLocaleString()} kcal/día`;

    // Macros
    document.getElementById('ringKcal').textContent = kcal.toLocaleString();
    document.getElementById('valP').textContent = protG+'g';
    document.getElementById('valC').textContent = carbG+'g';
    document.getElementById('valF').textContent = fatG+'g';
    setTimeout(() => {
      document.getElementById('ringP').style.strokeDashoffset = circ*(1-pctP/100);
      document.getElementById('ringC').style.strokeDashoffset = circ*(1-pctP/100-pctC/100);
      document.getElementById('ringF').style.strokeDashoffset = 0;
      document.getElementById('barP').style.width = pctP+'%';
      document.getElementById('barC').style.width = pctC+'%';
      document.getElementById('barF').style.width = pctF+'%';
    }, 300);

    // Timeline
    const meals = obj==='crecer' ? MEALS_CRECER : MEALS_BAJAR;
    const tips  = obj==='crecer' ? TIPS_CRECER  : TIPS_BAJAR;
    const restr = profile.food_restrictions || [];
    const tl = document.getElementById('timeline');

    tl.innerHTML = meals.map((meal, i) => {
      const mK = Math.round(kcal  * meal.pct);
      const mP = Math.round(protG * meal.pct);
      const mC = Math.round(carbG * meal.pct);
      const mF = Math.round(fatG  * meal.pct);
      const portions = getPortions(meal.name, mK, obj, restr);
      const tip = tips[meal.name] || '';

      const portionsHTML = portions.map(p => `
        <div class="portion-row">
          <div class="p-ico">${p.ico}</div>
          <div style="flex:1">
            <div class="p-name">${p.name}</div>
            ${p.replaced ? '<div class="p-replaced">✅ Ajustado a tu perfil</div>' : ''}
          </div>
          <div class="p-qty">${p.qty}</div>
        </div>
      `).join('');

      return `
        <div class="tl-row">
          <div class="tl-left">
            <div class="tl-time">${meal.time}</div>
            <div class="tl-line"></div>
          </div>
          <div style="flex:1">
            <div class="meal-card">
              <div class="meal-top" onclick="toggleMeal(${i})">
                <div class="meal-icon">${meal.icon}</div>
                <div style="flex:1">
                  <div class="meal-name">${meal.name}</div>
                  <div class="chips">
                    <span class="chip chip-k">~${mK}kcal</span>
                    <span class="chip chip-p">${mP}g prot</span>
                    <span class="chip chip-c">${mC}g carbo</span>
                    <span class="chip chip-f">${mF}g grasa</span>
                  </div>
                </div>
                <div class="meal-arr" id="arr-${i}">▾</div>
              </div>
              <div class="portions" id="pt-${i}">
                <div class="portions-ttl">🍽️ Qué comer exactamente</div>
                ${portionsHTML}
                ${tip ? `<div class="meal-tip"><span>💡</span><span>${tip}</span></div>` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Rules
    const rules = obj==='crecer' ? [
      {ico:'⏰', txt: esH ? 'Come cada 3-4 horas. No dejes más de 4h sin proteína.' : 'Come cada 3-4 horas. No dejes pasar más de 4 horas sin comer proteína.'},
      {ico:'💧', txt: esH ? 'Mínimo 3 litros de agua al día.' : 'Mínimo 2.5 litros de agua al día. Hidratación = síntesis muscular.'},
      {ico:'😴', txt: 'El músculo crece durmiendo. Duerme 7-8 horas obligatorio.'},
      {ico:'📈', txt: 'Sube el peso cada semana que completes todas las reps. Sin progresión no hay resultado.'},
    ] : [
      {ico:'⚡', txt: esH ? 'No bajes de 1.500 kcal. Comer poco destruye músculo.' : 'No bajes de 1.200 kcal. Menos destruye músculo, no grasa.'},
      {ico:'💪', txt: 'Alta proteína todos los días — protege el músculo mientras pierdes grasa.'},
      {ico:'🚫', txt: 'Elimina harinas blancas, azúcar y jugos de caja. Son tu mayor enemigo.'},
      {ico:'💧', txt: 'Toma agua antes de cada comida — reduce el hambre naturalmente.'},
    ];

    const objLabel = obj==='crecer'
      ? (esH ? 'ganar masa muscular' : 'crecer y tonificar')
      : (esH ? 'bajar grasa' : 'bajar grasa y tonificar');
    document.getElementById('rulesTtl').textContent = `💡 Tus reglas para ${objLabel}`;
    document.getElementById('rulesBody').innerHTML = rules.map(r => `
      <div class="rule-row">
        <div class="rule-ico">${r.ico}</div>
        <div class="rule-txt">${r.txt}</div>
      </div>
    `).join('');

  } catch(e) {
    console.error('Nutrition error:', e);
    showError(e.message);
  }
}

function toggleMeal(i) {
  const pt  = document.getElementById(`pt-${i}`);
  const arr = document.getElementById(`arr-${i}`);
  const open = pt.classList.toggle('open');
  arr.classList.toggle('up', open);
}

function showError(msg) {
  document.getElementById('hdrSub').textContent = '❌ Error';
  document.getElementById('timeline').innerHTML = `
    <div style="padding:24px;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-size:15px;color:var(--text2);margin-bottom:6px">${msg}</div>
      <a href="dashboard.html" style="display:inline-block;margin-top:12px;padding:14px 24px;background:var(--primary);color:white;border-radius:12px;font-weight:800;text-decoration:none">🏠 Volver al inicio</a>
    </div>`;
}

init();
</script>
<script src="../js/chatbubble.js"></script>
</body>
</html>
