<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ArjunaFit — Guía de Alimentos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/af.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/lang.js"></script>
<link rel="stylesheet" href="../css/app.css">
<style>
body{background:var(--bg)}

.guia-hdr{
  padding:20px 16px 28px;color:white;
  background:linear-gradient(135deg,#059669,#10b981);
  position:relative;overflow:hidden;
}
.guia-hdr::after{content:'🥗';position:absolute;right:-10px;bottom:-20px;font-size:100px;opacity:.1}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;border:none;color:white}
.hdr-title{font-size:26px;font-weight:900;letter-spacing:-.5px}
.hdr-sub{font-size:14px;opacity:.85;margin-top:3px}

/* Search */
.search-wrap{
  margin:-16px 14px 0;position:relative;z-index:5;
  background:var(--surface);border-radius:16px;border:1.5px solid var(--border);
  box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;padding:13px 16px;
  transition:background .25s,border-color .25s;
}
.search-ico{font-size:20px;color:var(--text3);flex-shrink:0}
.search-in{flex:1;border:none;outline:none;font-family:var(--font);font-size:16px;font-weight:600;color:var(--text);background:transparent}
.search-in::placeholder{color:var(--text3)}
.search-clear{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:2px 6px}

/* Section pills */
.pills{display:flex;gap:8px;padding:16px 14px 8px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill-btn{flex-shrink:0;padding:9px 16px;border-radius:999px;font-size:16px;font-weight:700;cursor:pointer;background:var(--surface);border:2px solid var(--border);color:var(--text2);transition:all .2s;white-space:nowrap}
.pill-btn.on{background:var(--green);border-color:var(--green);color:white}

.guia-body{padding:12px 14px 100px}

/* ── SEMAFORO ── */
.sem-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.sem-card{border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s}
.sem-card.g{background:var(--green-light);border:2px solid rgba(5,150,105,.2)}
.sem-card.y{background:var(--gold-light);border:2px solid rgba(217,119,6,.2)}
.sem-card.r{background:var(--red-light);border:2px solid rgba(220,38,38,.2)}
.sem-card:active{transform:scale(.97)}
.sem-emo{font-size:32px;display:block;margin-bottom:6px}
.sem-ttl{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.sem-card.g .sem-ttl{color:var(--green)}
.sem-card.y .sem-ttl{color:var(--gold)}
.sem-card.r .sem-ttl{color:var(--red)}
.sem-count{font-size:14px;color:var(--text3);margin-top:3px;font-weight:600}

.sem-exp{border-radius:16px;padding:14px 16px;margin-bottom:10px;display:none}
.sem-exp.open{display:block}
.sem-exp.g{background:var(--green-light);border:2px solid rgba(5,150,105,.2)}
.sem-exp.y{background:var(--gold-light);border:2px solid rgba(217,119,6,.2)}
.sem-exp.r{background:var(--red-light);border:2px solid rgba(220,38,38,.2)}
.sem-exp-ttl{font-size:14px;font-weight:800;margin-bottom:10px}
.sem-exp.g .sem-exp-ttl{color:var(--green)}
.sem-exp.y .sem-exp-ttl{color:var(--gold)}
.sem-exp.r .sem-exp-ttl{color:var(--red)}
.sem-item{font-size:14px;color:var(--text);padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06);display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.sem-item:last-child{border-bottom:none}
.sem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.g .sem-dot{background:var(--green)}
.y .sem-dot{background:var(--gold)}
.r .sem-dot{background:var(--red)}

/* ── PRODUCTS (from PDF) ── */
.sec-title{font-size:19px;font-weight:900;color:var(--text);margin-bottom:4px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.sec-sub{font-size:16px;color:var(--text2);margin-bottom:14px;line-height:1.5}

.prod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.prod-card:active{transform:scale(.99)}
.prod-card.rec{border-left:4px solid var(--green)}
.prod-card.mod{border-left:4px solid var(--gold)}

.prod-top{padding:14px 16px;display:flex;align-items:center;gap:12px}
.prod-emo{font-size:30px;flex-shrink:0}
.prod-info{flex:1}
.prod-name{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.prod-brand{font-size:15px;color:var(--text2);margin-top:2px}
.prod-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ptag{font-size:14px;font-weight:700;padding:3px 9px;border-radius:999px}
.ptag-rec{background:rgba(5,150,105,.1);color:var(--green)}
.ptag-mod{background:rgba(217,119,6,.1);color:var(--gold)}
.ptag-kcal{background:var(--primary-light);color:var(--primary)}
.prod-chev{font-size:15px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.prod-chev.up{transform:rotate(180deg)}

.prod-body{display:none;padding:0 16px 14px;border-top:1.5px solid var(--border);animation:fadeUp .25s ease}
.prod-body.open{display:block}
.prod-benefit{margin-top:12px;padding:12px 14px;background:var(--surface2);border-radius:12px;font-size:14px;color:var(--text2);line-height:1.6}
.prod-how{margin-top:8px;padding:10px 14px;background:var(--primary-light);border-radius:12px;font-size:16px;color:var(--primary);line-height:1.5;display:flex;gap:7px}

/* Reemplazos */
.rep-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px}
.rep-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:13px 16px;border-bottom:1.5px solid var(--border);align-items:start}
.rep-row:last-child{border-bottom:none}
.rep-from{font-size:16px;font-weight:700;color:var(--text2)}
.rep-arrow{font-size:18px;color:var(--text3);padding-top:2px}
.rep-to{font-size:16px;font-weight:700;color:var(--green)}
.rep-note{font-size:14px;color:var(--text3);margin-top:3px}

/* Tips */
.tip-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;display:flex;gap:14px}
.tip-ico{font-size:24px;flex-shrink:0;width:36px;height:36px;background:var(--primary-light);border-radius:10px;display:flex;align-items:center;justify-content:center}
.tip-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}
.tip-txt{font-size:16px;color:var(--text2);line-height:1.5}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-ico{font-size:48px;margin-bottom:12px}

/* Bottom nav */
.bottom-nav{display:flex;background:var(--surface);border-top:1.5px solid var(--border);padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;color:var(--text3);font-size:14px;font-weight:700;cursor:pointer;border:none;background:none;font-family:var(--font);text-decoration:none;transition:color .2s}
.nav-item .ni{font-size:26px;line-height:1}
.nav-item.on{color:var(--green)}
</style>
</head>
<body>
<div class="shell">

  <div class="guia-hdr">
    <div class="back-row">
      <button class="back" onclick="history.back()">←</button>
      <div>

      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-ico">🔍</div>
    <input class="search-in" id="searchIn" placeholder="Buscar alimento o producto..." oninput="onSearch(this.value)">

  <div class="pills" id="pillsRow">

    <button class="pill-btn" onclick="showSec('carbos',this)">🌾 Carbos</button>

    <button class="pill-btn" onclick="showSec('snacks',this)">🍫 Snacks</button>
    <button class="pill-btn" onclick="showSec('suplementos',this)">💊 Suplementos</button>
    <button class="pill-btn" onclick="showSec('reemplazos',this)">🔄 Reemplazos</button>
    <button class="pill-btn" onclick="showSec('tips',this)">💡 Tips</button>
  </div>

  <div class="scroll"><div class="guia-body" id="guiaBody"></div></div>

    <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Inicio</a>
    <a href="nutrition.html" class="nav-item"><span class="ni">🍽️</span>Nutrición</a>

</div>

let currentSec = 'semaforo';
let semOpen = {g:false, y:false, r:false};

// ── RENDER ──
function render(sec) {
  const b = document.getElementById('guiaBody');
  b.innerHTML = '';
  if(sec==='semaforo') renderSemaforo(b);
  else if(sec==='reemplazos') renderReemplazos(b);
  else if(sec==='tips') renderTips(b);
  else renderProducts(b, sec);
}

function renderSemaforo(b) {
  b.innerHTML = `
    <p style="font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.55">
      🚦 <strong style="color:var(--text)">Usa esto en el supermercado.</strong> Toca cada color para ver los alimentos.
    </p>
    <div class="sem-grid">
      <div class="sem-card g" onclick="toggleSem('g')">
        <span class="sem-emo">🟢</span>
        <div class="sem-ttl">Come siempre</div>
        <div class="sem-count">${DATA.semaforo.verde.length} alimentos</div>
      </div>
      <div class="sem-card y" onclick="toggleSem('y')">
        <span class="sem-emo">🟡</span>
        <div class="sem-ttl">Con moderación</div>
        <div class="sem-count">${DATA.semaforo.amarillo.length} alimentos</div>
      </div>
      <div class="sem-card r" onclick="toggleSem('r')">
        <span class="sem-emo">🔴</span>
        <div class="sem-ttl">Evitar</div>
        <div class="sem-count">${DATA.semaforo.rojo.length} alimentos</div>
      </div>
    </div>
    <div class="sem-exp g" id="sem-g">
      <div class="sem-exp-ttl">✅ COME SIEMPRE — tus aliados</div>
      ${DATA.semaforo.verde.map(i=>`<div class="sem-item"><div class="sem-dot"></div><span>${i}</span></div>`).join('')}
    </div>
    <div class="sem-exp y" id="sem-y">
      <div class="sem-exp-ttl">⚠️ CON MODERACIÓN — máximo 1 porción al día</div>
      ${DATA.semaforo.amarillo.map(i=>`<div class="sem-item"><div class="sem-dot"></div><span>${i}</span></div>`).join('')}
    </div>
    <div class="sem-exp r" id="sem-r">
      <div class="sem-exp-ttl">❌ EVITAR — dificultan tu objetivo</div>
      ${DATA.semaforo.rojo.map(i=>`<div class="sem-item"><div class="sem-dot"></div><span>${i}</span></div>`).join('')}
    </div>
    <div style="background:var(--primary-light);border-radius:16px;padding:16px;margin-top:6px">
      <div style="font-size:14px;font-weight:800;color:var(--primary);margin-bottom:6px">💡 Regla de oro</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.6">Un día fuera del plan no arruina nada. Lo que cuenta es la <strong style="color:var(--text)">suma de tus hábitos</strong> a largo plazo. Sé amable contigo.</div>
    </div>
  `;
}

window.toggleSem = (k) => {
  semOpen[k]=!semOpen[k];
  document.getElementById(`sem-${k}`).classList.toggle('open',semOpen[k]);
};

function renderProducts(b, sec) {
  const items = DATA[sec]||[];
  const titles={proteinas:'🥩 Proteínas',carbos:'🌾 Carbohidratos',grasas:'🥑 Grasas Saludables',snacks:'🍫 Snacks y Dulces',suplementos:'💊 Suplementos'};
  const subs={
    proteinas:'Toca cualquier producto para ver por qué es bueno y cómo usarlo.',
    carbos:'Energía limpia para entrenar fuerte. Sin gluten y sin azúcar añadido.',
    grasas:'Las grasas buenas son esenciales para tus hormonas y resultados. No las elimines.',
    snacks:'El antojo existe — aquí tienes opciones que no dañan tu objetivo.',
    suplementos:'Solo 3 suplementos realmente funcionan. Todo lo demás es marketing.',
  };

  b.innerHTML = `
    <div class="sec-title">${titles[sec]}</div>
    <p class="sec-sub">${subs[sec]||''}</p>
    ${items.map((item,i)=>`
      <div class="prod-card ${item.status}" onclick="toggleProd(${i})">
        <div class="prod-top">
          <div class="prod-emo">${item.emo}</div>
          <div class="prod-info">
            <div class="prod-name">${item.name}</div>
            <div class="prod-brand">${item.brand}</div>
            <div class="prod-tags">
              <span class="ptag ${item.status==='rec'?'ptag-rec':'ptag-mod'}">${item.status==='rec'?'✅ Recomendado':'⚠️ Moderado'}</span>
              <span class="ptag ptag-kcal">${item.kcal}</span>
              <span class="ptag" style="background:var(--surface2);color:var(--text3)">${item.freq}</span>
            </div>
          </div>
          <div class="prod-chev" id="pc-${i}">▾</div>
        </div>
        <div class="prod-body" id="pb-${i}">
          <div class="prod-benefit"><strong>¿Por qué comerlo?</strong><br>${item.benefit}</div>
          <div class="prod-how">💡 <span><strong>¿Cómo usarlo?</strong> ${item.how}</span></div>
        </div>
      </div>
    `).join('')}
  `;
}

window.toggleProd = (i) => {
  const body = document.getElementById(`pb-${i}`);
  const chev = document.getElementById(`pc-${i}`);
  const isOpen = body.classList.contains('open');
  // Close all others first
  document.querySelectorAll('[id^="pb-"]').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('[id^="pc-"]').forEach(el => el.classList.remove('up'));
  // Toggle clicked
  if(!isOpen) {
    body.classList.add('open');
    chev.classList.add('up');
    body.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
};

function renderReemplazos(b) {
  b.innerHTML = `
    <div class="sec-title">🔄 Reemplazos Inteligentes</div>
    <p class="sec-sub">¿No tienes un ingrediente? Aquí con qué reemplazarlo sin perder resultados.</p>

      ${DATA.reemplazos.map(r=>`

        </div>
      `).join('')}
    </div>

      </div>

}

function renderTips(b) {
  b.innerHTML = `
    <div class="sec-title">💡 Consejos Prácticos</div>

    ${DATA.tips.map(t=>`
      <div class="tip-card">

        <div><div class="tip-title">${t.title}</div><div class="tip-txt">${t.txt}</div></div>
      </div>
    `).join('')}
  `;

// ── SEARCH ──
window.onSearch = (val) => {
  if(!val.trim()){render(currentSec);return}
  const q=val.toLowerCase();
  const b=document.getElementById('guiaBody');
  const all=[...DATA.proteinas,...DATA.carbos,...DATA.grasas,...DATA.snacks,...DATA.suplementos]
    .filter(f=>f.name.toLowerCase().includes(q)||f.brand.toLowerCase().includes(q)||f.benefit.toLowerCase().includes(q));

  if(!all.length){
    b.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div><div style="font-size:16px;font-weight:700">No encontramos "${val}"</div><div style="margin-top:6px;color:var(--text3);font-size:14px">Prueba con otro nombre</div></div>`;
    return;
  }
  b.innerHTML=`<div style="font-size:14px;color:var(--text2);margin-bottom:14px">${all.length} resultado${all.length>1?'s':''} para "<strong>${val}</strong>"</div>`+
    all.map((item,i)=>`
      <div class="prod-card ${item.status}" onclick="toggleProd(${i})">
        <div class="prod-top">
          <div class="prod-emo">${item.emo}</div>
          <div class="prod-info">
            <div class="prod-name">${item.name}</div>
            <div class="prod-brand">${item.brand}</div>
            <div class="prod-tags">
              <span class="ptag ${item.status==='rec'?'ptag-rec':'ptag-mod'}">${item.status==='rec'?'✅ Recomendado':'⚠️ Moderado'}</span>
              <span class="ptag ptag-kcal">${item.kcal}</span>
            </div>
          </div>
          <div class="prod-chev" id="pc-${i}">▾</div>
        </div>
        <div class="prod-body" id="pb-${i}">
          <div class="prod-benefit"><strong>¿Por qué?</strong><br>${item.benefit}</div>
          <div class="prod-how">💡 <span>${item.how}</span></div>
        </div>
      </div>
    `).join('');
};

window.clearSearch = () => { document.getElementById('searchIn').value=''; render(currentSec); };

window.showSec = (sec, el) => {
  currentSec=sec;
  document.querySelectorAll('.pill-btn').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  render(sec);
  document.querySelector('.scroll').scrollTop=0;
};

render('semaforo');
</script>
